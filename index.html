      saveSessions();
      renderHistory();
    }

    function emptyAttachments() {
      return { text: [], image: [], video: [] };
    }

    async function handleImageFileSelection(event) {
      const files = Array.from(event.target.files || []).filter((file) => file.type && file.type.startsWith("image/"));
      event.target.value = "";
      if (!files.length) return;
      const bucket = state.attachments[state.mode] || [];
      const remaining = Math.max(0, MAX_ATTACHMENTS - bucket.length);
      if (!remaining) {
        toast("最多可添加 " + MAX_ATTACHMENTS + " 张图片");
        return;
      }
      if (files.length > remaining) toast("最多可添加 " + MAX_ATTACHMENTS + " 张图片，已保留前 " + remaining + " 张");
      const accepted = files.slice(0, remaining);
      for (const file of accepted) {
        if (file.size > MAX_ATTACHMENT_BYTES) {
          toast(file.name + " 超过 8MB，已跳过");
          continue;
        }
        try {
          const dataUrl = await fileToDataUrl(file);
          bucket.push({
            id: makeId(),
            name: file.name || "本地图片",
            type: file.type || "image/png",
            size: file.size || 0,
            dataUrl
          });
        } catch (error) {
          toast("读取图片失败：" + (file.name || "本地图片"));
        }
      }
      state.attachments[state.mode] = bucket;
      renderAttachments();
    }

    function renderAttachments() {
      const items = state.attachments[state.mode] || [];
      els.clearAttachmentsButton.hidden = !items.length;
      els.uploadImagesLabel.textContent = items.length ? "添加图片 (" + items.length + "/" + MAX_ATTACHMENTS + ")" : "添加图片";
      els.attachmentHint.textContent = attachmentHint();
      els.attachmentList.hidden = !items.length;
      els.attachmentList.innerHTML = "";
      items.forEach((item) => {
        const chip = document.createElement("div");
        chip.className = "attachment-chip";
        const img = document.createElement("img");
        img.src = item.dataUrl;
        img.alt = item.name || "本地图片";
        const info = document.createElement("div");
        const name = document.createElement("div");
        name.className = "attachment-name";
        name.textContent = item.name || "本地图片";
        const size = document.createElement("div");
        size.className = "attachment-size";
        size.textContent = formatBytes(item.size || 0);
        info.append(name, size);
        const remove = document.createElement("button");
        remove.className = "icon-button";
        remove.type = "button";
        remove.title = "移除图片";
        remove.setAttribute("aria-label", "移除图片");
        remove.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>';
        remove.addEventListener("click", () => removeAttachment(state.mode, item.id));
        chip.append(img, info, remove);
        els.attachmentList.appendChild(chip);
      });
    }

    function attachmentHint() {
      const count = (state.attachments[state.mode] || []).length;
      if (state.mode === "text") return count ? "图片理解模式" : "可添加图片一起提问";
      if (state.mode === "image") return count ? "已作为参考图" : "可添加多张参考图";
      return count ? "已作为视频参考图" : "可添加多张参考图或关键帧";
    }

    function removeAttachment(mode, id) {
      state.attachments[mode] = (state.attachments[mode] || []).filter((item) => item.id !== id);
      renderAttachments();
    }

    function clearModeAttachments(mode) {
      state.attachments[mode] = [];
      renderAttachments();
    }

    function attachmentMetas(mode, urlText) {
      const local = (state.attachments[mode] || []).map(({ id, name, type, size, dataUrl }) => ({
        id,
        name,
        type,
        size,
        previewUrl: dataUrl
      }));
      const remote = splitList(urlText || "").map((url, index) => ({
        id: "url-" + mode + "-" + index + "-" + makeId(),
        name: shortUrlName(url),
        type: "image/url",
        size: 0,
        previewUrl: url
      }));
      return [...remote, ...local];
    }

    function attachmentDataUrls(mode) {
      return (state.attachments[mode] || []).map((item) => item.dataUrl).filter(Boolean);
    }

    function collectImages(mode, urlText) {
      return [...splitList(urlText || ""), ...attachmentDataUrls(mode)];
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("File read failed"));
        reader.readAsDataURL(file);
      });
    }

    async function handleText(prompt) {
      const textImages = collectImages("text", els.textImageUrl.value);
      const userMessage = appendMessage({ mode: "text", role: "user", status: "done", content: prompt, attachments: attachmentMetas("text", els.textImageUrl.value) });
      const assistant = appendMessage({ mode: "text", role: "assistant", status: "loading", content: "" });
      const content = buildTextContent(prompt, textImages);
      const hasImages = textImages.length > 0;
      const payload = {
        model: hasImages ? TEXT_IMAGE_MODEL : TEXT_DEFAULT_MODEL,
        messages: buildChatMessages(content, userMessage.id),
        temperature: numberOrDefault(els.textTemperature.value, 0.7),
        max_tokens: Math.max(1, parseInt(els.textMaxTokens.value, 10) || 1024)
      };
      if (!hasImages && els.textStream.checked) payload.stream = true;
      if (!hasImages && els.textThinking.checked) payload.chat_template_kwargs = { enable_thinking: true };
      userMessage.raw = sanitizeForStorage(payload);
      saveActive();
      if (payload.stream) {
        await streamTextCompletion(payload, assistant.id);
      } else {
        const data = await fetchAgnes("/v1/chat/completions", { method: "POST", body: payload });
        const message = data && data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message : {};
        const answer = message.content || "";
        const thinking = message.reasoning_content || message.reasoning || message.thinking || "";
        updateMessage(assistant.id, {
          status: "done",
          content: answer || "没有返回文本内容。",
          thinking,
          usage: data.usage || null,
          raw: data
        });
      }
    }

    function buildTextContent(prompt, imageUrls) {
      if (!imageUrls.length) return prompt;
      return [
        { type: "text", text: prompt },
        ...imageUrls.map((url) => ({ type: "image_url", image_url: { url } }))
      ];
    }

    function buildChatMessages(content, excludeId) {
      const session = activeSession();
      const prior = (session ? session.messages : [])
        .filter((msg) => msg.id !== excludeId && msg.mode === "text" && msg.status === "done" && (msg.role === "user" || msg.role === "assistant"))
        .slice(-10)
        .map((msg) => ({ role: msg.role, content: msg.content }));
      prior.push({ role: "user", content });
      return prior;
    }

    async function streamTextCompletion(payload, messageId) {
      const response = await fetch(API_BASE + "/v1/chat/completions", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw await responseError(response);
      if (!response.body) throw new Error("浏览器不支持流式响应读取。");
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fullText = "";
      let thinkingText = "";
      let lastRaw = null;
      let usage = null;
      let done = false;
      while (!done) {
        const chunk = await reader.read();
        done = chunk.done;
        buffer += decoder.decode(chunk.value || new Uint8Array(), { stream: !done });
        const parts = buffer.split("\n");
        buffer = parts.pop() || "";
        for (const line of parts) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith("data:")) continue;
          const data = trimmed.slice(5).trim();
          if (data === "[DONE]") {
            done = true;
            break;
          }
          try {
            const json = JSON.parse(data);
            lastRaw = json;
            if (json.usage) usage = json.usage;
            const delta = json.choices && json.choices[0] && json.choices[0].delta;
            const content = delta && delta.content ? delta.content : "";
            const thinking = delta && (delta.reasoning_content || delta.reasoning || delta.thinking || "");
            if (content || thinking) {
              fullText += content;
              thinkingText += thinking;
              updateMessage(messageId, { content: fullText, thinking: thinkingText, usage, status: "loading", raw: json }, true);
            }
          } catch (error) {
            console.warn("Skipping stream chunk", error);
          }
        }
      }
      updateMessage(messageId, {
        content: fullText || "流式响应结束，但没有返回文本内容。",
        thinking: thinkingText,
        usage,
        raw: lastRaw,
        status: "done"
      });
    }

    async function handleImage(prompt) {
      appendMessage({ mode: "image", role: "user", status: "done", content: prompt, attachments: attachmentMetas("image", els.imageInputs.value) });
      const assistant = appendMessage({ mode: "image", role: "assistant", status: "loading", content: "正在创作图片，请稍等..." });
      const inputImages = collectImages("image", els.imageInputs.value);
      const output = els.imageOutput.value;
      const payload = {
        model: "agnes-image-2.1-flash",
        prompt
      };
      if (els.imageSize.value !== "auto") payload.size = els.imageSize.value;
      if (inputImages.length) {
        payload.extra_body = { image: inputImages, response_format: output === "base64" ? "b64_json" : "url" };
      } else if (output === "base64") {
        payload.return_base64 = true;
      } else {
        payload.extra_body = { response_format: "url" };
      }
      const data = await fetchAgnes("/v1/images/generations", { method: "POST", body: payload });
      const first = data && data.data && data.data[0] ? data.data[0] : {};
      const url = first.url || "";
      const b64 = first.b64_json || "";
      if (!url && !b64) {
        updateMessage(assistant.id, { status: "done", content: "图片已经处理完成，但这次没有拿到可预览的结果。可以展开调试详情查看。", raw: data });
        return;
      }
      updateMessage(assistant.id, {
        status: "done",
        content: url ? "图片创作完成。" : "图片创作完成，已返回可下载图片数据。",
        raw: data,
        result: {
          kind: "image",
          url: url || "data:image/png;base64," + b64,
          downloadName: "agnes-image.png"
        }
      });
    }

    async function handleVideo(prompt) {
      appendMessage({ mode: "video", role: "user", status: "done", content: prompt, attachments: attachmentMetas("video", [els.videoImage.value, els.videoExtraImages.value].join("\n")) });
      const assistant = appendMessage({ mode: "video", role: "assistant", status: "loading", content: "正在开始制作视频..." });
      const inputImages = collectImages("video", [els.videoImage.value, els.videoExtraImages.value].join("\n"));
      const payload = {
        model: "agnes-video-v2.0",
        prompt,
        ...getVideoTiming()
      };
      if (els.videoSize.value !== "auto") {
        const [width, height] = els.videoSize.value.split("x").map((value) => parseInt(value, 10));
        payload.width = width;
        payload.height = height;
      }
      if (inputImages.length === 1) payload.image = inputImages[0];
      if (inputImages.length > 1) payload.extra_body = { image: inputImages };
      const negative = els.videoNegative.value.trim();
      if (negative) payload.negative_prompt = negative;
      const task = await fetchAgnes("/v1/videos", { method: "POST", body: payload });
      const videoId = task.video_id;
      const taskId = task.task_id || task.id;
      updateMessage(assistant.id, {
        status: "loading",
        content: "视频已经开始制作，我会自动等待结果...",
        raw: task,
        task: {
          videoId,
          taskId,
          status: task.status || "queued",
          progress: task.progress || 0
        }
      });
      if (!videoId && !taskId) {
        updateMessage(assistant.id, { status: "done", content: "视频任务已创建，但没有拿到可自动查询的编号。可以展开调试详情查看。", raw: task });
        return;
      }
      await pollVideoResult(assistant.id, videoId, taskId);
    }

    async function pollVideoResult(messageId, videoId, taskId) {
      const limit = Math.min(120, Math.max(1, parseInt(els.videoPollLimit.value, 10) || 60));
      let last = null;
      for (let attempt = 1; attempt <= limit; attempt += 1) {
        await wait(attempt === 1 ? 1500 : 5000);
        const path = videoId
          ? "/agnesapi?video_id=" + encodeURIComponent(videoId) + "&model_name=agnes-video-v2.0"
          : "/v1/videos/" + encodeURIComponent(taskId);
        const data = await fetchAgnes(path, { method: "GET" });
        last = data;
        const status = data.status || "unknown";
        const progress = typeof data.progress === "number" ? data.progress : Math.min(99, Math.round((attempt / limit) * 100));
        updateMessage(messageId, {
          status: "loading",
          content: "视频还在生成中：" + statusLabel(status) + "（" + progress + "%）",
          raw: data,
          task: {
            videoId: data.video_id || videoId,
            taskId: data.task_id || data.id || taskId,
            status,
            progress
          }
        }, true);
        if (status === "completed") {
          const videoUrl = data.remixed_from_video_id || data.video_url || data.url || "";
          updateMessage(messageId, {
            status: "done",
            content: videoUrl ? "视频创作完成。" : "视频创作完成，但这次没有拿到可播放地址。",
            raw: data,
            task: {
              videoId: data.video_id || videoId,
              taskId: data.task_id || data.id || taskId,
              status,
              progress: 100
            },
            result: videoUrl ? { kind: "video", url: videoUrl, downloadName: "agnes-video.mp4" } : null
          });
          return;
        }
        if (status === "failed") {
          updateMessage(messageId, {
            status: "error",
            content: "视频创作失败了。可以展开调试详情查看 Agnes 返回的详细原因。",
            raw: data
          });
          return;
        }
      }
      updateMessage(messageId, {
        status: "done",
        content: "等待时间到了，视频可能还在制作中。可以稍后用调试详情里的 video_id 再查询。",
        raw: last
      });
    }

    async function fetchAgnes(path, options) {
      const init = {
        method: options.method || "GET",
        headers: authHeaders()
      };
      if (options.body !== undefined) init.body = typeof options.body === "string" ? options.body : JSON.stringify(options.body);
      let response;
      try {
        response = await fetch(API_BASE + path, init);
      } catch (error) {
        throw new Error("网络请求失败。请检查网络、API 地址，或浏览器是否阻止跨域请求。详情：" + error.message);
      }
      if (!response.ok) throw await responseError(response);
      const text = await response.text();
      if (!text) return {};
      try {
        return JSON.parse(text);
      } catch (error) {
        const err = new Error("响应不是有效 JSON。");
        err.raw = text;
        throw err;
      }
    }

    function authHeaders() {
      return {
        "Authorization": "Bearer " + state.apiKey,
        "Content-Type": "application/json"
      };
    }

    async function responseError(response) {
      const text = await response.text();
      let detail = text;
      try {
        const json = JSON.parse(text);
        detail = json.error && json.error.message ? json.error.message : JSON.stringify(json, null, 2);
      } catch (error) {
        detail = text || response.statusText;
      }
      const err = new Error("Agnes API 返回 " + response.status + "：" + detail);
      err.raw = text;
      err.status = response.status;
      return err;
    }

    function appendMessage(partial) {
      const session = activeSession() || createSession(false);
      const message = {
        id: makeId(),
        mode: partial.mode || state.mode,
        role: partial.role,
        content: partial.content || "",
        status: partial.status || "done",
        createdAt: new Date().toISOString(),
        raw: partial.raw || null,
        result: partial.result || null,
        task: partial.task || null,
        attachments: Array.isArray(partial.attachments) ? partial.attachments : [],
        thinking: partial.thinking || "",
        usage: partial.usage || null
      };
      session.messages.push(message);
      if (message.role === "user" && (session.title === "新的对话" || !session.title)) {
        session.title = makeTitle(message.content);
      }
      session.mode = state.mode;
      session.settings = readSettings();
      session.updatedAt = Date.now();
      moveActiveToTop();
      saveSessions();
      renderThread();
      renderHistory();
      updateChatTitle();
      return message;
    }

    function updateMessage(id, patch, shallow) {
      const session = activeSession();
      if (!session) return;
      const message = session.messages.find((item) => item.id === id);
      if (!message) return;
      Object.assign(message, patch);
      session.updatedAt = Date.now();
      moveActiveToTop();
      saveSessions();
      if (!shallow || !updateLiveMessage(message)) renderThread();
      renderHistory();
      updateChatTitle();
      scrollToBottom();
    }

    function showRequestError(error) {
      const session = activeSession();
      const loading = session ? [...session.messages].reverse().find((message) => message.role === "assistant" && message.status === "loading") : null;
      const patch = {
        status: "error",
        content: formatError(error),
        raw: error && error.raw ? error.raw : null
      };
      if (loading) updateMessage(loading.id, patch);
      else appendMessage({ mode: state.mode, role: "assistant", ...patch });
    }

    function renderThread() {
      const session = activeSession();
      const hasMessages = Boolean(session && session.messages.length);
      els.emptyState.hidden = hasMessages;
      els.thread.hidden = !hasMessages;
      els.thread.innerHTML = "";
      if (session) session.messages.forEach((message) => els.thread.appendChild(renderMessage(message)));
      scrollToBottom();
    }

    function renderMessage(message) {
      const article = document.createElement("article");
      article.className = "message " + message.role;
      article.dataset.messageId = message.id;
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = message.role === "user" ? "你" : "A";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      const meta = document.createElement("div");
      meta.className = "meta";
      renderMessageMeta(meta, message);
      const body = document.createElement("div");
      body.className = "message-body";
      body.textContent = message.content || "";
      bubble.append(meta, body);
      if (message.thinking) bubble.insertBefore(renderThinking(message.thinking), body);
      if (message.attachments && message.attachments.length) bubble.appendChild(renderMessageAttachments(message.attachments));
      if (message.task) bubble.appendChild(renderTask(message.task));
      if (message.result) bubble.appendChild(renderResult(message.result));
      if (state.advancedMode && state.showDebug && message.raw) bubble.appendChild(renderRaw(message.raw, message.id));
      article.append(avatar, bubble);
      return article;
    }

    function renderMessageMeta(meta, message) {
      meta.innerHTML = "";
      if (state.advancedMode) {
        const tag = document.createElement("span");
        tag.className = "mode-tag";
        tag.textContent = MODE_CONFIG[message.mode].tag;
        const time = document.createElement("span");
        time.textContent = new Date(message.createdAt).toLocaleString();
        const status = document.createElement("span");
        status.textContent = statusLabel(message.status);
        status.className = message.status === "error" ? "error-text" : "";
        meta.append(tag, time, status);
      } else {
        const time = document.createElement("span");
        time.textContent = formatFriendlyTime(message.createdAt);
        meta.appendChild(time);
      }
      const usage = formatUsage(message.usage);
      if (usage) {
        const tokens = document.createElement("span");
        tokens.textContent = usage;
        meta.appendChild(tokens);
      }
    }

    function updateLiveMessage(message) {
      const node = document.querySelector('[data-message-id="' + message.id + '"]');
      if (!node) return false;
      const meta = node.querySelector(".meta");
      if (meta) renderMessageMeta(meta, message);
      upsertThinking(node, message.thinking || "");
      const body = node.querySelector(".message-body");
      if (body) body.textContent = message.content || "";
      const raw = node.querySelector(".raw-block");
      if (raw && message.raw) raw.textContent = stringify(message.raw);
      const task = node.querySelector(".task-progress");
      if (task && message.task) {
        const status = task.querySelector("[data-task-status]");
        const progress = task.querySelector("[data-task-progress]");
        const fill = task.querySelector(".progress-fill");
        if (status) status.textContent = statusLabel(message.task.status || "unknown");
        if (progress) progress.textContent = String(message.task.progress || 0) + "%";
        if (fill) fill.style.width = String(Math.min(100, Math.max(0, message.task.progress || 0))) + "%";
      }
      return true;
    }

    function upsertThinking(node, thinking) {
      const existing = node.querySelector(".thinking-block");
      if (!thinking) {
        if (existing) existing.remove();
        return;
      }
      if (existing) {
        const copy = existing.querySelector(".thinking-copy");
        if (copy) copy.textContent = thinking;
        return;
      }
      const body = node.querySelector(".message-body");
      const bubble = node.querySelector(".bubble");
      if (!body || !bubble) return;
      bubble.insertBefore(renderThinking(thinking), body);
    }

    function renderThinking(thinking) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "thinking-block";
      button.setAttribute("aria-expanded", "false");
      const head = document.createElement("div");
      head.className = "thinking-head";
      const title = document.createElement("span");
      title.textContent = "思考过程";
      const stateLabel = document.createElement("span");
      stateLabel.className = "thinking-toggle-label";
      stateLabel.textContent = "展开";
      head.append(title, stateLabel);
      const copy = document.createElement("div");
      copy.className = "thinking-copy";
      copy.textContent = thinking;
      button.append(head, copy);
      button.addEventListener("click", () => {
        const expanded = button.getAttribute("aria-expanded") === "true";
        button.setAttribute("aria-expanded", String(!expanded));
        stateLabel.textContent = expanded ? "展开" : "收起";
      });
      return button;
    }

    function renderMessageAttachments(attachments) {
      const wrap = document.createElement("div");
      wrap.className = "message-attachments";
      attachments.forEach((item) => {
        const hasPreview = Boolean(item.previewUrl);
        const row = document.createElement("div");
        row.className = "message-attachment";
        let preview;
        if (hasPreview) {
          preview = document.createElement("div");
          preview.className = "message-attachment-preview";
          const img = document.createElement("img");
          img.src = item.previewUrl;
          img.alt = item.name || "参考图";
          preview.appendChild(img);
        } else {
          preview = document.createElement("div");
          preview.className = "message-attachment-icon";
          preview.innerHTML = ICONS.image;
        }
        const text = document.createElement("div");
        const name = document.createElement("div");
        name.className = "message-attachment-name";
        name.textContent = item.name || "参考图";
        const size = document.createElement("div");
        size.className = "message-attachment-size";
        size.textContent = hasPreview ? "悬浮查看操作" : formatBytes(item.size || 0);
        text.append(name, size);
        row.append(preview, text);
        if (hasPreview) row.appendChild(renderAttachmentActions(item.previewUrl, item.name || "参考图"));
        wrap.appendChild(row);
      });
      return wrap;
    }

    function renderAttachmentActions(url, name) {
      const actions = document.createElement("div");
      actions.className = "attachment-overlay";
      const preview = document.createElement("button");
      preview.type = "button";
      preview.className = "attachment-action";
      preview.textContent = "预览";
      preview.addEventListener("click", () => openImagePreview(url, name));
      const open = document.createElement("button");
      open.type = "button";
      open.className = "attachment-action";
      open.textContent = "新标签页打开";
      open.addEventListener("click", () => openInNewTab(url));
      const download = document.createElement("button");
      download.type = "button";
      download.className = "attachment-action";
      download.textContent = "下载";
      download.addEventListener("click", () => downloadImage(url, name || "reference-image"));
      actions.append(preview, open, download);
      return actions;
    }

    function renderTask(task) {
      const wrap = document.createElement("div");
      wrap.className = "task-progress";
      const line = document.createElement("div");
      line.className = "meta";
      line.innerHTML = '状态：<strong data-task-status></strong> · 进度：<strong data-task-progress></strong>';
      const bar = document.createElement("div");
      bar.className = "progress-bar";
      const fill = document.createElement("div");
      fill.className = "progress-fill";
      bar.appendChild(fill);
      const ids = document.createElement("div");
      ids.className = "meta";
      ids.textContent = [task.videoId ? "video_id: " + task.videoId : "", task.taskId ? "task_id: " + task.taskId : ""].filter(Boolean).join(" · ");
      wrap.append(line, bar, ids);
      setTimeout(() => {
        const status = wrap.querySelector("[data-task-status]");
        const progress = wrap.querySelector("[data-task-progress]");
        if (status) status.textContent = statusLabel(task.status || "unknown");
        if (progress) progress.textContent = String(task.progress || 0) + "%";
        fill.style.width = String(Math.min(100, Math.max(0, task.progress || 0))) + "%";
      });
      return wrap;
    }

    function renderResult(result) {
      const wrap = document.createElement("div");
      wrap.className = "result-media";
      let media;
      if (result.kind === "video") {
        media = document.createElement("video");
        media.controls = true;
        media.playsInline = true;
      } else {
        media = document.createElement("img");
        media.alt = "Agnes generated image";
      }
      media.src = result.url;
      wrap.appendChild(media);
      const actions = document.createElement("div");
      actions.className = "message-actions";
      const open = document.createElement("button");
      open.className = "debug-button";
      open.type = "button";
      open.textContent = result.kind === "image" ? "新标签页打开" : "打开";
      open.addEventListener("click", () => openInNewTab(result.url));
      const download = document.createElement("button");
      download.className = "debug-button";
      download.type = "button";
      download.textContent = "下载";
      download.addEventListener("click", () => downloadImage(result.url, result.downloadName || "agnes-result"));
      actions.append(open, download);
      wrap.appendChild(actions);
      return wrap;
    }

    function renderRaw(raw, id) {
      const details = document.createElement("details");
      details.className = "debug-details";
      const summary = document.createElement("summary");
      summary.textContent = "调试详情";
      const pre = document.createElement("pre");
      pre.className = "raw-block";
      pre.textContent = stringify(raw);
      const actions = document.createElement("div");
      actions.className = "message-actions";
      const button = document.createElement("button");
      button.className = "debug-button";
      button.type = "button";
      button.textContent = "复制调试详情";
      button.addEventListener("click", async () => {
        await copyText(stringify(raw));
        toast("调试详情已复制");
      });
      actions.appendChild(button);
      details.append(summary, pre, actions);
      return details;
    }

    function saveActive() {
      const session = activeSession();
      if (!session) return;
      session.settings = readSettings();
      session.updatedAt = Date.now();
      moveActiveToTop();
      saveSessions();
      renderHistory();
    }

    function moveActiveToTop() {
      const idx = state.sessions.findIndex((session) => session.id === state.activeSessionId);
      if (idx > 0) {
        const [session] = state.sessions.splice(idx, 1);
        state.sessions.unshift(session);
      }
    }

    function applyVideoDurationPreset() {
      if (!els.videoDuration || els.videoDuration.value === "custom") return;
      const [frames, fps] = els.videoDuration.value.split(":");
      els.videoFrames.value = frames;
      els.videoFrameRate.value = fps;
    }

    function getVideoTiming() {
      if (els.videoDuration.value !== "custom") applyVideoDurationPreset();
      return {
        num_frames: Math.min(441, Math.max(9, parseInt(els.videoFrames.value, 10) || 121)),
        frame_rate: Math.min(60, Math.max(1, parseFloat(els.videoFrameRate.value) || 24))
      };
    }

    function splitList(value) {
      return value.split(/[\n,]+/).map((item) => item.trim()).filter(Boolean);
    }

    function shortUrlName(url) {
      try {
        const parsed = new URL(url);
        const last = parsed.pathname.split("/").filter(Boolean).pop();
        return last || parsed.hostname || "参考图 URL";
      } catch (error) {
        return "参考图 URL";
      }
    }

    function openImagePreview(url, name) {
      if (!url) return;
      els.imagePreviewModal.dataset.url = url;
      els.imagePreviewModal.dataset.name = name || "agnes-image";
      els.imagePreviewTitle.textContent = name || "图片预览";
      els.imagePreviewImg.src = url;
      els.imagePreviewImg.alt = name || "图片预览";
      els.imagePreviewModal.hidden = false;
    }

    function closeImagePreview() {
      els.imagePreviewModal.hidden = true;
      els.imagePreviewImg.removeAttribute("src");
      delete els.imagePreviewModal.dataset.url;
      delete els.imagePreviewModal.dataset.name;
    }

    function openInNewTab(url) {
      if (!url) return;
      window.open(url, "_blank", "noopener,noreferrer");
    }

    async function downloadImage(url, filename) {
      if (!url) return;
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("HTTP " + response.status);
        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        triggerDownload(objectUrl, safeDownloadName(filename, blob.type));
        setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
      } catch (error) {
        if (url.startsWith("data:")) {
          triggerDownload(url, safeDownloadName(filename, ""));
          return;
        }
        toast("浏览器无法直接下载这个远程图片，请尝试新标签页打开后保存。");
      }
    }

    function triggerDownload(url, filename) {
      const link = document.createElement("a");
      link.href = url;
      link.download = filename || "agnes-image.png";
      link.style.display = "none";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function safeDownloadName(name, mimeType) {
      const fallbackExt = mimeType && mimeType.includes("jpeg") ? ".jpg" : mimeType && mimeType.includes("webp") ? ".webp" : ".png";
      const clean = String(name || "agnes-image").replace(/[\\/:*?"<>|]+/g, "-").trim() || "agnes-image";
      return /\.[a-z0-9]{2,5}$/i.test(clean) ? clean : clean + fallbackExt;
    }

    function numberOrDefault(value, fallback) {
      const num = Number(value);
      return Number.isFinite(num) ? num : fallback;
    }

    function formatBytes(bytes) {
      if (!bytes) return "本地图片";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function stringify(value) {
      if (typeof value === "string") return value;
      try {
        return JSON.stringify(value, null, 2);
      } catch (error) {
        return String(value);
      }
    }

    function formatError(error) {
      const message = error && error.message ? error.message : String(error);
      if ((error && error.status === 401) || message.includes("无效的令牌")) {
        return "连接 Agnes 失败：这个 API Key 看起来无效或已过期，请重新粘贴后再试。";
      }
      if (message.includes("网络请求失败") || message.includes("跨域")) {
        return "这次没有连上 Agnes。请检查网络连接，稍后再试。";
      }
      if (error && error.status) {
        return "这次创作没有成功。可以展开调试详情查看 Agnes 返回的信息。";
      }
      return message;
    }

    function statusLabel(status) {
      return {
        done: "完成",
        loading: "生成中",
        error: "需要处理",
        queued: "排队中",
        in_progress: "生成中",
        completed: "完成",
        failed: "失败",
        unknown: "处理中"
      }[status] || status;
    }

    function formatFriendlyTime(value) {
      const time = new Date(value).getTime();
      if (!Number.isFinite(time)) return "";
      const diff = Date.now() - time;
      if (diff < 60000) return "刚刚";
      if (diff < 3600000) return Math.floor(diff / 60000) + " 分钟前";
      const sameDay = startOfDay(time) === startOfDay(Date.now());
      if (sameDay) return new Date(time).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      return new Date(time).toLocaleDateString([], { month: "2-digit", day: "2-digit" });
    }

    function formatUsage(usage) {
      if (!usage || typeof usage !== "object") return "";
      const total = usage.total_tokens || usage.total || usage.tokens;
      if (total) return "消耗 " + total + " tokens";
      const prompt = usage.prompt_tokens || usage.input_tokens || 0;
      const completion = usage.completion_tokens || usage.output_tokens || 0;
      const sum = prompt + completion;
      return sum ? "消耗 " + sum + " tokens" : "";
    }

    function makeTitle(content) {
      return content.replace(/\s+/g, " ").trim().slice(0, 26) || "新的对话";
    }

    function makeId() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function startOfDay(time) {
      const date = new Date(time);
      date.setHours(0, 0, 0, 0);
      return date.getTime();
    }

    function formatMonth(time) {
      const date = new Date(time);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        els.messages.scrollTop = els.messages.scrollHeight;
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    let toastTimer = null;
    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove("show"), 2600);
    }
  </script>
</body>
</html>
