<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Agnes AI Chat</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%235D8CFF'/%3E%3Cpath d='M18 39c9-19 26-19 28-18-2 13-10 22-25 26 4-5 9-8 17-12-8 1-15 5-20 4Z' fill='white'/%3E%3Ccircle cx='42' cy='23' r='3' fill='%2332C7B5'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: dark;
      --bg: #111214;
      --sidebar: #17181b;
      --panel: #202125;
      --panel-2: #2b2c31;
      --panel-3: #34363c;
      --text: #f1f3f5;
      --muted: #9da3ae;
      --subtle: #727986;
      --line: #2c2e34;
      --brand: #5d8cff;
      --brand-2: #32c7b5;
      --danger: #ff7b72;
      --success: #59d596;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
      --radius: 12px;
      --sidebar-w: 292px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: light) {
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --sidebar: #ffffff;
        --panel: #ffffff;
        --panel-2: #f0f4f8;
        --panel-3: #e5ebf2;
        --text: #18212f;
        --muted: #667085;
        --subtle: #8a94a3;
        --line: #d9e1ea;
        --brand: #2865d9;
        --brand-2: #0d9488;
        --danger: #b42318;
        --success: #067647;
        --shadow: 0 18px 42px rgba(16, 24, 40, 0.12);
      }
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
      height: 100vh;
      min-height: 100vh;
      background: var(--bg);
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      gap: 16px;
      min-height: 100vh;
      padding: 18px 14px;
      border-right: 1px solid var(--line);
      background: var(--sidebar);
      overflow: hidden;
    }

    @supports (height: 100dvh) {
      .app,
      .main {
        height: 100dvh;
        min-height: 100dvh;
      }

      .sidebar {
        min-height: 100dvh;
      }
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 0 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      font-weight: 900;
      letter-spacing: 0;
    }

    .brand-name {
      display: grid;
      min-width: 0;
    }

    .brand-name strong {
      overflow: hidden;
      font-size: 18px;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-name span {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .icon-button,
    .new-chat-button,
    .ghost-button,
    .send-button,
    .mode-pill,
    .tool-button,
    .suggestion-chip,
    .history-item,
    .debug-button {
      border: 0;
      border-radius: var(--radius);
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      color: var(--muted);
      background: transparent;
      transition: background 150ms ease, color 150ms ease;
    }

    .icon-button:hover {
      color: var(--text);
      background: var(--panel-2);
    }

    .icon-button svg,
    .new-chat-button svg,
    .ghost-button svg,
    .send-button svg,
    .mode-pill svg,
    .tool-button svg,
    .debug-button svg {
      width: 18px;
      height: 18px;
      flex: none;
    }

    .new-chat-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 48px;
      width: 100%;
      color: var(--text);
      background: var(--panel-3);
      font-size: 15px;
      font-weight: 800;
      transition: background 150ms ease, transform 120ms ease;
    }

    .new-chat-button:hover {
      transform: translateY(-1px);
      background: color-mix(in srgb, var(--panel-3), var(--brand) 18%);
    }

    .search-box {
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 16px;
      height: 16px;
      color: var(--subtle);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .input,
    .select {
      min-height: 38px;
      padding: 8px 10px;
    }

    .search-input {
      padding-left: 36px;
      background: color-mix(in srgb, var(--panel), var(--bg) 16%);
    }

    .textarea {
      min-height: 104px;
      max-height: 240px;
      padding: 16px;
      border: 0;
      background: transparent;
      resize: none;
      line-height: 1.55;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: color-mix(in srgb, var(--brand), white 8%);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand), transparent 78%);
    }

    .textarea:focus {
      box-shadow: none;
    }

    .history-list {
      min-height: 0;
      overflow: auto;
      padding-right: 3px;
    }

    .history-group {
      display: grid;
      gap: 4px;
      margin-bottom: 18px;
    }

    .history-heading {
      padding: 8px 10px 4px;
      color: var(--subtle);
      font-size: 12px;
      font-weight: 800;
    }

    .history-row {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 30px;
      align-items: center;
      gap: 4px;
    }

    .history-item {
      min-width: 0;
      min-height: 38px;
      padding: 9px 10px;
      color: color-mix(in srgb, var(--text), var(--muted) 8%);
      background: transparent;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 150ms ease, color 150ms ease;
    }

    .history-item:hover,
    .history-row.active .history-item {
      color: var(--text);
      background: var(--panel-2);
    }

    .history-delete {
      opacity: 0;
      width: 30px;
      height: 30px;
    }

    .history-row:hover .history-delete,
    .history-row.active .history-delete {
      opacity: 1;
    }

    .sidebar-footer {
      display: grid;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .connection-card {
      display: grid;
      gap: 9px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel), var(--bg) 10%);
    }

    .connection-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .connection-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 12px;
      font-weight: 800;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--subtle);
    }

    .status-pill.ready .status-dot {
      background: var(--success);
    }

    .api-key-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 6px;
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      height: 100vh;
      min-width: 0;
      background:
        radial-gradient(circle at 80% 10%, color-mix(in srgb, var(--brand), transparent 86%), transparent 38%),
        var(--bg);
    }

    .mobile-topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 58px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg), var(--panel) 45%);
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 10px 22px;
      color: var(--muted);
    }

    .chat-title {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .messages {
      min-height: 0;
      overflow: auto;
      padding: 20px 24px 24px;
    }

    .welcome {
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 24px 0;
    }

    .welcome-inner {
      display: grid;
      gap: 22px;
      width: min(860px, 100%);
      justify-items: center;
      text-align: center;
    }

    .welcome-logo {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 15px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 16px 34px color-mix(in srgb, var(--brand), transparent 72%);
      font-size: 24px;
      font-weight: 900;
    }

    .welcome h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .welcome p {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .suggestions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .suggestion-chip {
      display: grid;
      gap: 8px;
      min-height: 116px;
      padding: 14px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel), var(--bg) 8%);
      color: var(--text);
      text-align: left;
      transition: border-color 150ms ease, transform 120ms ease, background 150ms ease;
    }

    .suggestion-chip:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--brand), var(--line) 50%);
      background: color-mix(in srgb, var(--panel), var(--brand) 8%);
    }

    .suggestion-chip strong {
      font-size: 14px;
    }

    .suggestion-chip span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .thread {
      display: grid;
      gap: 22px;
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .message {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .message.user {
      grid-template-columns: minmax(0, 1fr) 38px;
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      font-size: 13px;
      font-weight: 900;
    }

    .message.user .avatar {
      grid-column: 2;
      background: var(--panel-3);
      color: var(--text);
    }

    .bubble {
      min-width: 0;
      padding-top: 2px;
    }

    .message.user .bubble {
      grid-column: 1;
      justify-self: end;
      max-width: min(720px, 100%);
      padding: 12px 14px;
      border-radius: 16px;
      background: color-mix(in srgb, var(--brand), var(--panel) 82%);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      color: var(--subtle);
      font-size: 12px;
    }

    .mode-tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 7px;
      border-radius: 999px;
      color: color-mix(in srgb, var(--brand), white 20%);
      background: color-mix(in srgb, var(--brand), transparent 84%);
      font-size: 11px;
      font-weight: 900;
    }

    .message-body {
      color: var(--text);
      font-size: 15px;
      line-height: 1.72;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .message-body:empty::after {
      content: "正在思考...";
      color: var(--muted);
    }

    .message-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .debug-details {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel), var(--bg) 10%);
    }

    .debug-details summary {
      min-height: 38px;
      padding: 9px 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      list-style: none;
    }

    .debug-details summary::-webkit-details-marker {
      display: none;
    }

    .raw-block {
      max-height: 260px;
      margin: 0;
      padding: 12px;
      overflow: auto;
      border-top: 1px solid var(--line);
      color: color-mix(in srgb, var(--text), var(--muted) 18%);
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .debug-button,
    .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 10px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .debug-button:hover,
    .ghost-button:hover {
      color: var(--text);
      background: var(--panel-3);
    }

    .result-media {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .result-media img,
    .result-media video {
      display: block;
      width: min(100%, 720px);
      max-height: 520px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      object-fit: contain;
    }

    .thinking-block {
      display: grid;
      gap: 8px;
      width: 100%;
      margin: 0 0 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-left: 3px solid color-mix(in srgb, var(--brand), var(--brand-2) 30%);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel), var(--bg) 10%);
      color: var(--muted);
      text-align: left;
    }

    .thinking-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: color-mix(in srgb, var(--text), var(--muted) 18%);
      font-size: 13px;
      font-weight: 900;
    }

    .thinking-copy {
      max-height: calc(1.55em * 3);
      overflow: hidden;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .thinking-block[aria-expanded="true"] .thinking-copy {
      max-height: none;
    }

    .thinking-toggle-label {
      color: var(--subtle);
      font-size: 12px;
      font-weight: 800;
    }

    .task-progress {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .progress-bar {
      width: 100%;
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--panel-2);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      transition: width 220ms ease;
    }

    .composer-wrap {
      padding: 0 24px 22px;
    }

    .composer {
      display: grid;
      gap: 10px;
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: color-mix(in srgb, var(--panel), var(--bg) 6%);
      box-shadow: var(--shadow);
    }

    .mode-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .mode-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 12px;
      color: var(--muted);
      background: transparent;
      font-size: 14px;
      font-weight: 800;
      transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }

    .mode-pill[aria-pressed="true"] {
      color: color-mix(in srgb, var(--brand), white 18%);
      background: color-mix(in srgb, var(--brand), transparent 86%);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--brand), transparent 38%);
    }

    .composer-input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .send-stack {
      display: grid;
      gap: 8px;
      align-items: end;
    }

    .send-button {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      transition: transform 120ms ease, opacity 150ms ease;
    }

    .send-button:not(:disabled):hover {
      transform: translateY(-1px);
    }

    .send-button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .advanced-mode-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--panel-2);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .advanced-mode-button[aria-pressed="true"] {
      color: color-mix(in srgb, var(--brand), white 14%);
      border-color: color-mix(in srgb, var(--brand), var(--line) 28%);
      background: color-mix(in srgb, var(--brand), transparent 86%);
    }

    .composer-tools {
      display: grid;
      gap: 10px;
    }

    .attachment-panel {
      display: grid;
      gap: 9px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .attachment-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tool-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 13px;
      font-weight: 800;
      transition: background 150ms ease, color 150ms ease, transform 120ms ease;
    }

    .tool-button:hover {
      color: var(--text);
      background: var(--panel-3);
      transform: translateY(-1px);
    }

    .attachment-hint {
      color: var(--subtle);
      font-size: 12px;
      font-weight: 700;
    }

    .attachment-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }

    .attachment-chip,
    .message-attachment {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel), var(--bg) 8%);
    }

    .attachment-chip img {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      object-fit: cover;
      background: var(--panel-2);
    }

    .attachment-name,
    .message-attachment-name {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-size,
    .message-attachment-size {
      color: var(--subtle);
      font-size: 11px;
    }

    .message-attachments {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .message-attachment {
      grid-template-columns: 42px minmax(0, 1fr);
      max-width: 360px;
      color: inherit;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .message-attachment-preview,
    .message-attachment-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 9px;
      color: color-mix(in srgb, var(--brand), white 18%);
      background: color-mix(in srgb, var(--brand), transparent 86%);
      overflow: hidden;
    }

    .message-attachment-icon svg {
      width: 17px;
      height: 17px;
    }

    .message-attachment-preview img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .attachment-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      align-items: center;
      padding: 7px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--panel), black 18%) 42%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms ease;
    }

    .message-attachment:hover .attachment-overlay,
    .message-attachment:focus-within .attachment-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .attachment-action {
      min-height: 30px;
      padding: 5px 8px;
      border: 0;
      border-radius: 9px;
      color: var(--text);
      background: color-mix(in srgb, var(--panel-3), black 12%);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .attachment-action:hover {
      background: color-mix(in srgb, var(--brand), var(--panel-3) 68%);
    }

    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
    }

    .image-modal-card {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      width: min(1020px, 100%);
      max-height: min(780px, calc(100vh - 48px));
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .image-modal-head {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      min-width: 0;
    }

    .image-modal-title {
      min-width: 0;
      overflow: hidden;
      font-size: 14px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .image-modal-stage {
      display: grid;
      place-items: center;
      min-height: 0;
      overflow: auto;
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--bg), black 12%);
    }

    .image-modal-stage img {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 150px);
      object-fit: contain;
    }

    .simple-settings,
    .advanced-fields {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .simple-settings .wide,
    .advanced-fields .wide {
      grid-column: span 2;
    }

    .simple-settings .full,
    .advanced-fields .full {
      grid-column: 1 / -1;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .option-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .check {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--panel);
      font-size: 13px;
      font-weight: 800;
    }

    .check input {
      width: 16px;
      height: 16px;
      accent-color: var(--brand);
    }

    .advanced-settings {
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .advanced-settings summary {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      list-style: none;
      cursor: pointer;
    }

    .advanced-settings summary::-webkit-details-marker {
      display: none;
    }

    .advanced-fields {
      margin-top: 8px;
    }

    .advanced-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 2px 0 8px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: min(420px, calc(100vw - 36px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .sidebar-backdrop {
      display: none;
    }

    .error-text {
      color: var(--danger);
    }

    @media (max-width: 1040px) {
      .suggestions {
        grid-template-columns: 1fr;
      }

      .simple-settings,
      .advanced-fields {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      body {
        overflow: hidden;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 30;
        width: min(86vw, var(--sidebar-w));
        transform: translateX(-105%);
        transition: transform 180ms ease;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .sidebar-backdrop {
        position: fixed;
        inset: 0;
        z-index: 25;
        display: block;
        background: rgba(0, 0, 0, 0.42);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      body.sidebar-open .sidebar-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      .main {
        height: 100vh;
        min-height: 0;
      }

      .mobile-topbar {
        display: flex;
      }

      .chat-header {
        display: none;
      }

      .messages {
        min-height: 0;
        padding: 18px 14px 24px;
      }

      .composer-wrap {
        max-height: calc(100vh - 76px);
        overflow: auto;
        padding: 0 12px 14px;
      }

      @supports (height: 100dvh) {
        .main {
          height: 100dvh;
        }

        .composer-wrap {
          max-height: calc(100dvh - 76px);
        }
      }
    }

    @media (max-width: 560px) {
      .message,
      .message.user {
        grid-template-columns: 1fr;
      }

      .avatar,
      .message.user .avatar {
        display: none;
      }

      .message.user .bubble {
        grid-column: auto;
      }

      .composer {
        border-radius: 18px;
      }

      .composer-input-row {
        grid-template-columns: 1fr;
      }

      .send-button {
        width: 100%;
      }

      .send-stack {
        align-items: stretch;
      }

      .simple-settings,
      .advanced-fields {
        grid-template-columns: 1fr;
      }

      .simple-settings .wide,
      .advanced-fields .wide {
        grid-column: auto;
      }

      .welcome h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="会话历史">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">A</div>
          <div class="brand-name">
            <strong>Agnes AI</strong>
            <span>创作聊天助手</span>
          </div>
        </div>
        <button class="icon-button mobile-close" id="closeSidebarButton" type="button" aria-label="关闭侧栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </div>

      <button class="new-chat-button" id="newChatButton" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
        开启新对话
      </button>

      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input class="input search-input" id="historySearchInput" type="search" placeholder="搜索历史对话">
      </div>

      <div class="history-list" id="historyList" aria-label="历史对话"></div>

      <div class="sidebar-footer">
        <div class="connection-card">
          <div class="connection-head">
            <span class="connection-title">连接 Agnes</span>
            <span class="status-pill" id="keyStatus"><span class="status-dot"></span><span>未连接</span></span>
          </div>
          <div class="api-key-row">
            <input class="input" id="apiKeyInput" autocomplete="off" spellcheck="false" type="password" placeholder="粘贴 API Key">
            <button class="icon-button" id="toggleKeyButton" type="button" title="显示或隐藏 API Key" aria-label="显示或隐藏 API Key">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
            <button class="icon-button" id="clearKeyButton" type="button" title="清除 API Key" aria-label="清除 API Key">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="mobile-topbar">
        <button class="icon-button" id="openSidebarButton" type="button" aria-label="打开侧栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h16"></path></svg>
        </button>
        <strong>Agnes AI</strong>
        <button class="icon-button" id="mobileNewChatButton" type="button" aria-label="开启新对话">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
        </button>
      </header>

      <header class="chat-header">
        <div class="chat-title" id="chatTitle">新的 Agnes 对话</div>
        <div class="chat-actions">
          <button class="ghost-button" id="copyThreadButton" type="button">复制记录</button>
          <button class="ghost-button" id="clearThreadButton" type="button">清空当前对话</button>
        </div>
      </header>

      <section class="messages" id="messages" aria-live="polite">
        <div class="welcome" id="emptyState">
          <div class="welcome-inner">
            <div class="welcome-logo" aria-hidden="true">A</div>
            <div>
              <h1>使用 Agnes 开始创作</h1>
              <p>像聊天一样描述需求。可以写作、生成图片、制作视频，也可以在一个对话里持续修改方向。</p>
            </div>
            <div class="suggestions" id="welcomeSuggestions"></div>
          </div>
        </div>
        <div class="thread" id="thread" hidden></div>
      </section>

      <div class="composer-wrap">
        <form class="composer" id="composer">
          <div class="mode-pills" aria-label="创作模式">
            <button class="mode-pill" type="button" data-mode="text" aria-pressed="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"></path></svg>
              写作
            </button>
            <button class="mode-pill" type="button" data-mode="image" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M21 15l-5-5L5 21"></path></svg>
              图片
            </button>
            <button class="mode-pill" type="button" data-mode="video" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 8l6-3v14l-6-3Z"></path><rect x="3" y="6" width="11" height="12" rx="2"></rect></svg>
              视频
            </button>
          </div>

          <div class="composer-input-row">
            <textarea class="textarea" id="promptInput" required placeholder="给 Agnes 发送消息"></textarea>
            <div class="send-stack">
              <button class="send-button" id="sendButton" type="submit" aria-label="发送">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5"></path><path d="m5 12 7-7 7 7"></path></svg>
              </button>
              <button class="advanced-mode-button" id="advancedModeButton" type="button" aria-pressed="false">高级</button>
            </div>
          </div>

          <div class="composer-tools">
            <div class="attachment-panel" id="attachmentPanel">
              <div class="attachment-actions">
                <button class="tool-button" id="uploadImagesButton" type="button">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m21.4 11.6-8.5 8.5a5 5 0 0 1-7.1-7.1l9.2-9.2a3.5 3.5 0 0 1 5 5l-9.2 9.2a2 2 0 0 1-2.8-2.8l8.5-8.5"></path></svg>
                  <span id="uploadImagesLabel">添加图片</span>
                </button>
                <button class="tool-button" id="clearAttachmentsButton" type="button" hidden>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>
                  清除图片
                </button>
                <span class="attachment-hint" id="attachmentHint"></span>
              </div>
              <input id="imageFileInput" type="file" accept="image/*" multiple hidden>
              <div class="attachment-list" id="attachmentList" aria-label="已添加图片" hidden></div>
            </div>

            <div class="simple-settings" id="simpleSettings">
              <div class="field" data-simple-param="image" hidden>
                <label for="imageSize" data-basic-label="画面比例" data-advanced-label="size">画面比例</label>
                <select class="select" id="imageSize">
                  <option value="auto">保持原比例 · 自动</option>
                  <option value="1024x768">横版海报 · 1024x768</option>
                  <option value="768x1024">竖版封面 · 768x1024</option>
                  <option value="1024x1024">方形头像 · 1024x1024</option>
                  <option value="1280x720">宽屏封面 · 1280x720</option>
                  <option value="720x1280">手机竖屏 · 720x1280</option>
                </select>
              </div>
              <div class="field wide" data-simple-param="image" hidden>
                <label for="imageInputs" data-basic-label="参考图 URL" data-advanced-label="extra_body.image[]">参考图 URL</label>
                <input class="input" id="imageInputs" spellcheck="false" placeholder="公开图片 URL，多个可用换行分隔">
              </div>
              <div class="field" data-simple-param="video" hidden>
                <label for="videoSize" data-basic-label="画面比例" data-advanced-label="width / height">画面比例</label>
                <select class="select" id="videoSize">
                  <option value="auto">保持原比例 · 自动</option>
                  <option value="1152x768">横版短片 · 1152x768</option>
                  <option value="1280x768">宽屏展示 · 1280x768</option>
                  <option value="1024x576">轻量横版 · 1024x576</option>
                  <option value="768x1152">手机竖屏 · 768x1152</option>
                </select>
              </div>
              <div class="field" data-simple-param="video" hidden>
                <label for="videoDuration" data-basic-label="视频长度" data-advanced-label="num_frames / frame_rate">视频长度</label>
                <select class="select" id="videoDuration">
                  <option value="121:24">标准短片 · 121 帧 / 24 FPS</option>
                  <option value="81:24">更短更快 · 81 帧 / 24 FPS</option>
                  <option value="201:24">更长展示 · 201 帧 / 24 FPS</option>
                  <option value="custom">使用高级设置 · 自定义帧数 / FPS</option>
                </select>
              </div>
              <div class="field wide" data-simple-param="video" hidden>
                <label for="videoImage" data-basic-label="参考图 URL" data-advanced-label="image">参考图 URL</label>
                <input class="input" id="videoImage" type="url" placeholder="公开图片 URL">
              </div>
              <div class="field wide" data-simple-param="video" hidden>
                <label for="videoExtraImages" data-basic-label="关键帧 URL" data-advanced-label="extra_body.image[]">关键帧 URL</label>
                <input class="input" id="videoExtraImages" spellcheck="false" placeholder="多张公开图片 URL，可用换行分隔">
              </div>
            </div>

            <details class="advanced-settings" id="advancedSettings">
              <summary>API 选项</summary>
              <div class="advanced-toolbar">
                <button class="tool-button" id="debugToggleButton" type="button" aria-pressed="false">显示调试信息</button>
              </div>
              <div class="advanced-fields" id="advancedFields">
                <div class="field" data-param="text">
                  <label for="textTemperature" data-basic-label="创意程度" data-advanced-label="temperature">创意程度</label>
                  <input class="input" id="textTemperature" type="number" min="0" max="2" step="0.1" value="0.7">
                </div>
                <div class="field" data-param="text">
                  <label for="textMaxTokens" data-basic-label="回答长度" data-advanced-label="max_tokens">回答长度</label>
                  <input class="input" id="textMaxTokens" type="number" min="1" step="1" value="1024">
                </div>
                <div class="field wide" data-param="text">
                  <label for="textImageUrl" data-basic-label="附加图片 URL" data-advanced-label="messages.content[].image_url.url">附加图片 URL</label>
                  <input class="input" id="textImageUrl" type="url" placeholder="https://example.com/image.jpg">
                </div>
                <div class="field full" data-param="text">
                  <div class="option-row">
                    <label class="check" for="textStream"><input id="textStream" type="checkbox"><span data-basic-label="边写边显示" data-advanced-label="stream">边写边显示</span></label>
                    <label class="check" for="textThinking"><input id="textThinking" type="checkbox"><span data-basic-label="加强推理" data-advanced-label="chat_template_kwargs.enable_thinking">加强推理</span></label>
                  </div>
                </div>

                <div class="field" data-param="image" hidden>
                  <label for="imageOutput" data-basic-label="结果格式" data-advanced-label="response_format / return_base64">结果格式</label>
                  <select class="select" id="imageOutput">
                    <option value="url">直接预览</option>
                    <option value="base64">Base64</option>
                  </select>
                </div>

                <div class="field" data-param="video" hidden>
                  <label for="videoFrames" data-basic-label="帧数" data-advanced-label="num_frames">帧数</label>
                  <input class="input" id="videoFrames" type="number" min="9" max="441" step="8" value="121">
                </div>
                <div class="field" data-param="video" hidden>
                  <label for="videoFrameRate" data-basic-label="FPS" data-advanced-label="frame_rate">FPS</label>
                  <input class="input" id="videoFrameRate" type="number" min="1" max="60" step="1" value="24">
                </div>
                <div class="field" data-param="video" hidden>
                  <label for="videoPollLimit" data-basic-label="检查次数" data-advanced-label="poll_limit">检查次数</label>
                  <input class="input" id="videoPollLimit" type="number" min="1" max="120" step="1" value="60">
                </div>
                <div class="field full" data-param="video" hidden>
                  <label for="videoNegative" data-basic-label="不想出现的内容" data-advanced-label="negative_prompt">不想出现的内容</label>
                  <input class="input" id="videoNegative" spellcheck="false" placeholder="例如：低清晰度、变形、杂乱背景">
                </div>
              </div>
            </details>
          </div>
        </form>
      </div>
    </main>
  </div>

  <button class="sidebar-backdrop" id="sidebarBackdrop" type="button" aria-label="关闭侧栏"></button>
  <div class="image-modal" id="imagePreviewModal" role="dialog" aria-modal="true" aria-labelledby="imagePreviewTitle" hidden>
    <div class="image-modal-card">
      <div class="image-modal-head">
        <div class="image-modal-title" id="imagePreviewTitle">图片预览</div>
        <div class="message-actions">
          <button class="debug-button" id="modalOpenButton" type="button">新标签页打开</button>
          <button class="debug-button" id="modalDownloadButton" type="button">下载</button>
          <button class="debug-button" id="modalCloseButton" type="button">关闭</button>
        </div>
      </div>
      <div class="image-modal-stage">
        <img id="imagePreviewImg" alt="图片预览">
      </div>
    </div>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const API_BASE = "https://apihub.agnes-ai.com";
    const STORAGE_KEY = "agnes_chat_sessions_v1";
    const TEXT_DEFAULT_MODEL = "agnes-2.0-flash";
    const TEXT_IMAGE_MODEL = "agnes-1.5-flash";
    const MAX_ATTACHMENTS = 8;
    const MAX_ATTACHMENT_BYTES = 8 * 1024 * 1024;

    function loadSessions() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        state.sessions = Array.isArray(parsed.sessions) ? parsed.sessions : [];
        state.activeSessionId = parsed.activeSessionId || (state.sessions[0] && state.sessions[0].id) || null;
      } catch (error) {
        state.sessions = [];
        state.activeSessionId = null;
      }
      state.sessions = state.sessions
        .filter((session) => session && session.id)
        .map((session) => ({
          id: session.id,
          title: session.title || "新的对话",
          createdAt: session.createdAt || Date.now(),
          updatedAt: session.updatedAt || Date.now(),
          mode: MODE_CONFIG[session.mode] ? session.mode : "text",
          messages: Array.isArray(session.messages) ? session.messages : [],
          settings: { ...defaultSettings(), ...(session.settings || {}) }
        }))
        .sort((a, b) => b.updatedAt - a.updatedAt);
      if (state.activeSessionId && !state.sessions.some((session) => session.id === state.activeSessionId)) {
        state.activeSessionId = state.sessions[0] ? state.sessions[0].id : null;
      }
      const session = activeSession();
      if (session) {
        state.mode = session.mode;
        applySettings(session.settings);
      }
    }

    function saveSessions() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          activeSessionId: state.activeSessionId,
          sessions: state.sessions.slice(0, 80).map(serializeSession)
        }));
      } catch (error) {
        console.warn("Unable to save sessions", error);
      }
    }

    function serializeSession(session) {
      return {
        ...session,
        settings: { ...defaultSettings(), ...(session.settings || {}) },
        messages: (session.messages || []).map((message) => ({
          ...message,
          raw: sanitizeForStorage(message.raw),
          result: sanitizeResultForStorage(message.result),
          thinking: message.thinking || "",
          usage: message.usage || null,
          attachments: (message.attachments || []).map(sanitizeAttachmentForStorage)
        }))
      };
    }

    function sanitizeAttachmentForStorage(item) {
      const previewUrl = typeof item.previewUrl === "string" && item.previewUrl.startsWith("data:image/") ? "" : item.previewUrl || "";
      return {
        id: item.id,
        name: item.name,
        type: item.type,
        size: item.size || 0,
        previewUrl
      };
    }

    function sanitizeResultForStorage(result) {
      if (!result) return null;
      if (typeof result.url === "string" && result.url.startsWith("data:image/")) {
        return null;
      }
      return sanitizeForStorage(result);
    }

    function sanitizeForStorage(value) {
      if (value == null) return value;
      if (typeof value === "string") {
        if (value.startsWith("data:image/")) return "[local image omitted]";
        if (value.length > 16000) return value.slice(0, 12000) + "\n...[truncated]";
        return value;
      }
      if (Array.isArray(value)) return value.map(sanitizeForStorage);
      if (typeof value === "object") {
        return Object.fromEntries(Object.entries(value).map(([key, val]) => [key, sanitizeForStorage(val)]));
      }
      return value;
    }

    function activeSession() {
      return state.sessions.find((session) => session.id === state.activeSessionId) || null;
    }

    function activateSession(id) {
      const session = state.sessions.find((item) => item.id === id);
      if (!session) return;
      state.activeSessionId = id;
      state.mode = session.mode;
      state.attachments = emptyAttachments();
      applySettings(session.settings);
      saveSessions();
      renderAll();
      closeSidebar();
    }

    function deleteSession(id) {
      state.sessions = state.sessions.filter((session) => session.id !== id);
      if (!state.sessions.length) {
        createSession(false);
      } else if (state.activeSessionId === id) {
        state.activeSessionId = state.sessions[0].id;
      }
      const session = activeSession();
      if (session) {
        state.mode = session.mode;
        state.attachments = emptyAttachments();
        applySettings(session.settings);
      }
      saveSessions();
      renderAll();
    }

    function setMode(mode) {
      if (!MODE_CONFIG[mode]) return;
      state.mode = mode;
      const session = activeSession();
      if (session) {
        session.mode = mode;
        session.updatedAt = Date.now();
      }
      saveSessions();
      renderMode();
      renderAttachments();
      renderSuggestions();
      renderHistory();
    }

      renderFieldLabels();
      renderOptionText();
      renderDebugToggle();

    function renderFieldLabels() {
      const key = state.advancedMode ? "advancedLabel" : "basicLabel";
      document.querySelectorAll("[data-basic-label][data-advanced-label]").forEach((node) => {

    function renderOptionText() {

        Array.from(select.options).forEach((option) => {

    function renderSuggestions() {
      els.welcomeSuggestions.innerHTML = "";
      Object.entries(MODE_CONFIG).forEach(([mode, config]) => {
        const suggestion = config.suggestions[0];
        const button = document.createElement("button");
        button.type = "button";
        button.className = "suggestion-chip";
        button.dataset.mode = mode;
        button.dataset.prompt = suggestion.prompt;
        button.innerHTML = `<strong>${escapeHtml(suggestion.title)}</strong><span>${escapeHtml(suggestion.desc)}</span>`;
        els.welcomeSuggestions.appendChild(button);
      });
    }

    function renderHistory() {
      const sessions = filteredSessions();
      els.historyList.innerHTML = "";
      if (!sessions.length) {
        const empty = document.createElement("div");
        empty.className = "history-heading";
        empty.textContent = "没有匹配的历史";
        els.historyList.appendChild(empty);
        return;
      }
      const groups = groupSessions(sessions);
      Object.entries(groups).forEach(([label, items]) => {
        const group = document.createElement("section");
        group.className = "history-group";
        const heading = document.createElement("div");
        heading.className = "history-heading";
        heading.textContent = label;
        group.appendChild(heading);
        items.forEach((session) => {
          const row = document.createElement("div");
          row.className = "history-row" + (session.id === state.activeSessionId ? " active" : "");
          const button = document.createElement("button");
          button.type = "button";
          button.className = "history-item";
          button.textContent = session.title || "新的对话";
          button.addEventListener("click", () => activateSession(session.id));
          const del = document.createElement("button");
          del.type = "button";
          del.className = "icon-button history-delete";
          del.title = "删除对话";
          del.setAttribute("aria-label", "删除对话");
          del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>';
          del.addEventListener("click", (event) => {
            event.stopPropagation();
            deleteSession(session.id);
          });
          row.append(button, del);
          group.appendChild(row);
        });
        els.historyList.appendChild(group);
      });
    }

    function filteredSessions() {
      if (!state.historyQuery) return state.sessions;
      return state.sessions.filter((session) => {
        const lastUser = [...session.messages].reverse().find((msg) => msg.role === "user");
        const haystack = `${session.title || ""} ${lastUser ? lastUser.content : ""}`.toLowerCase();
        return haystack.includes(state.historyQuery);
      });
    }

    function groupSessions(sessions) {
      const today = startOfDay(Date.now());
      return sessions.reduce((groups, session) => {
        const day = startOfDay(session.updatedAt);
        const diff = Math.round((today - day) / 86400000);
        const label = diff <= 0 ? "今天" : diff === 1 ? "昨天" : diff <= 30 ? "30 天内" : formatMonth(session.updatedAt);
        groups[label] = groups[label] || [];
        groups[label].push(session);
        return groups;
      }, {});
    }

      const session = activeSession();
      els.chatTitle.textContent = session ? session.title : "新的 Agnes 对话";

    function updateKeyStatus() {
      const isReady = Boolean(state.apiKey);

    function persistActiveSettings() {

      if (!session) return;
