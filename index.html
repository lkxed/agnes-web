<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Agnes AI Chat</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%235D8CFF'/%3E%3Cpath d='M18 39c9-19 26-19 28-18-2 13-10 22-25 26 4-5 9-8 17-12-8 1-15 5-20 4Z' fill='white'/%3E%3Ccircle cx='42' cy='23' r='3' fill='%2332C7B5'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: dark;
      --bg: #111214;
      --sidebar: #17181b;
      --panel: #202125;
      --panel-2: #2b2c31;
      --panel-3: #34363c;
      --text: #f1f3f5;
      --muted: #9da3ae;
      --subtle: #727986;
      --line: #2c2e34;
      --brand: #5d8cff;
      --brand-2: #32c7b5;
      --danger: #ff7b72;
      --success: #59d596;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
      --radius: 12px;
      --sidebar-w: 292px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: light) {
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --sidebar: #ffffff;
        --panel: #ffffff;
        --panel-2: #f0f4f8;
        --panel-3: #e5ebf2;
        --text: #18212f;
        --muted: #667085;
        --subtle: #8a94a3;
        --line: #d9e1ea;
        --brand: #2865d9;
        --brand-2: #0d9488;
        --danger: #b42318;
        --success: #067647;
        --shadow: 0 18px 42px rgba(16, 24, 40, 0.12);
      }
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
      height: 100vh;
      min-height: 100vh;
      background: var(--bg);
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      gap: 16px;
      min-height: 100vh;
      padding: 18px 14px;
      border-right: 1px solid var(--line);
      background: var(--sidebar);
      overflow: hidden;
    }

    @supports (height: 100dvh) {
      .app,
      .main {
        height: 100dvh;
        min-height: 100dvh;
      }

      .sidebar {
        min-height: 100dvh;
      }
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 0 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      font-weight: 900;
      letter-spacing: 0;
    }

    .brand-name {
      display: grid;
      min-width: 0;
    }

    .brand-name strong {
      overflow: hidden;
      font-size: 18px;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-name span {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .icon-button,
    .new-chat-button,
    .ghost-button,
    .send-button,
    .mode-pill,
    .tool-button,
    .suggestion-chip,
    .history-item,
    .debug-button {
      border: 0;
      border-radius: var(--radius);
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      color: var(--muted);
      background: transparent;
      transition: background 150ms ease, color 150ms ease;
    }

    .icon-button:hover {
      color: var(--text);
      background: var(--panel-2);
    }

    .icon-button svg,
    .new-chat-button svg,
    .ghost-button svg,
    .send-button svg,
    .mode-pill svg,
    .tool-button svg,
    .debug-button svg {
      width: 18px;
      height: 18px;
      flex: none;
    }

    .new-chat-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 48px;
      width: 100%;
      color: var(--text);
      background: var(--panel-3);
      font-size: 15px;
      font-weight: 800;
      transition: background 150ms ease, transform 120ms ease;
    }

    .new-chat-button:hover {
      transform: translateY(-1px);
      background: color-mix(in srgb, var(--panel-3), var(--brand) 18%);
    }

    .search-box {
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 16px;
      height: 16px;
      color: var(--subtle);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .input,
    .select {
      min-height: 38px;
      padding: 8px 10px;
    }

    .search-input {
      padding-left: 36px;
      background: color-mix(in srgb, var(--panel), var(--bg) 16%);
    }

    .textarea {
      min-height: 88px;
      max-height: 200px;
      padding: 8px 6px;
      border: 0;
      background: transparent;
      resize: none;
      line-height: 1.55;
      font-size: 16px;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: color-mix(in srgb, var(--brand), white 8%);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand), transparent 78%);
    }

    .textarea:focus {
      box-shadow: none;
    }

    .history-list {
      min-height: 0;
      overflow: auto;
      padding-right: 3px;
    }

    .history-group {
      display: grid;
      gap: 4px;
      margin-bottom: 18px;
    }

    .history-heading {
      padding: 8px 10px 4px;
      color: var(--subtle);
      font-size: 12px;
      font-weight: 800;
    }

    .history-row {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 30px;
      align-items: center;
      gap: 4px;
    }

    .history-row.menu-open {
      z-index: 6;
    }

    .history-item {
      min-width: 0;
      min-height: 38px;
      padding: 9px 10px;
      color: color-mix(in srgb, var(--text), var(--muted) 8%);
      background: transparent;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 150ms ease, color 150ms ease;
    }

    .history-item:hover,
    .history-row.active .history-item {
      color: var(--text);
      background: var(--panel-2);
    }

    .history-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-pin {
      display: inline-grid;
      place-items: center;
      width: 16px;
      margin-right: 6px;
      color: var(--brand);
      vertical-align: -2px;
    }

    .history-pin svg {
      width: 14px;
      height: 14px;
    }

    .history-menu-button {
      opacity: 0;
      width: 30px;
      height: 30px;
    }

    .history-row:hover .history-menu-button,
    .history-row.active .history-menu-button,
    .history-row.menu-open .history-menu-button {
      opacity: 1;
    }

    .history-menu {
      position: absolute;
      top: 34px;
      right: 0;
      z-index: 8;
      display: grid;
      gap: 4px;
      min-width: 156px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: color-mix(in srgb, var(--panel-3), var(--bg) 2%);
      box-shadow: var(--shadow);
    }

    .history-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 0;
      border-radius: 10px;
      color: var(--text);
      background: transparent;
      font-size: 15px;
      text-align: left;
    }

    .history-menu-item:hover {
      background: color-mix(in srgb, var(--panel-2), white 5%);
    }

    .history-menu-item.danger {
      color: var(--danger);
    }

    .history-menu-item svg {
      width: 20px;
      height: 20px;
      flex: none;
    }

    .history-rename-input {
      min-width: 0;
      height: 38px;
      padding: 7px 10px;
      border: 1px solid color-mix(in srgb, var(--brand), transparent 45%);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--panel-2);
      outline: none;
      font: inherit;
    }

    .history-rename-input:focus {
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand), transparent 78%);
    }

    .sidebar-footer {
      display: grid;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .connection-card {
      display: grid;
      gap: 9px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel), var(--bg) 10%);
    }

    .connection-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .connection-title-wrap {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }

    .connection-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .key-help-button {
      width: 26px;
      height: 26px;
      border-radius: 999px;
    }

    .key-help-panel {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid color-mix(in srgb, var(--brand), transparent 62%);
      border-radius: var(--radius);
      color: var(--muted);
      background: color-mix(in srgb, var(--panel-2), var(--bg) 12%);
      font-size: 12px;
      line-height: 1.55;
    }

    .key-help-panel[hidden] {
      display: none;
    }

    .key-help-panel a {
      color: color-mix(in srgb, var(--brand), white 15%);
      font-weight: 900;
      text-decoration: none;
    }

    .key-help-panel ol {
      display: grid;
      gap: 4px;
      margin: 0;
      padding-left: 18px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 4px 8px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--subtle);
    }

    .status-pill.ready .status-dot {
      background: var(--success);
    }

    .status-pill.checking .status-dot {
      background: var(--brand);
    }

    .status-pill.invalid .status-dot {
      background: var(--danger);
    }

    .api-key-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 6px;
    }

    .debug-mode-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel), var(--bg) 12%);
    }

    .debug-mode-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .debug-mode-copy strong {
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    .debug-mode-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .switch-button {
      position: relative;
      flex: none;
      width: 46px;
      height: 26px;
      border: 0;
      border-radius: 999px;
      background: var(--panel-3);
      transition: background 150ms ease;
    }

    .switch-button::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--muted);
      transition: transform 150ms ease, background 150ms ease;
    }

    .switch-button[aria-pressed="true"] {
      background: color-mix(in srgb, var(--brand), var(--panel-3) 36%);
    }

    .switch-button[aria-pressed="true"]::after {
      background: #fff;
      transform: translateX(20px);
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      height: 100vh;
      min-width: 0;
      background:
        radial-gradient(circle at 80% 10%, color-mix(in srgb, var(--brand), transparent 86%), transparent 38%),
        var(--bg);
    }

    .mobile-topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 58px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg), var(--panel) 45%);
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 10px 22px;
      color: var(--muted);
    }

    .chat-title {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .messages {
      min-height: 0;
      overflow: auto;
      padding: 20px 24px 24px;
    }

    .welcome {
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 24px 0;
    }

    .welcome-inner {
      display: grid;
      gap: 22px;
      width: min(860px, 100%);
      justify-items: center;
      text-align: center;
    }

    .welcome-logo {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 15px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 16px 34px color-mix(in srgb, var(--brand), transparent 72%);
      font-size: 24px;
      font-weight: 900;
    }

    .welcome-copy {
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .welcome h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .welcome p {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .suggestions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .suggestion-chip {
      display: grid;
      gap: 8px;
      min-height: 116px;
      padding: 14px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel), var(--bg) 8%);
      color: var(--text);
      text-align: left;
      transition: border-color 150ms ease, transform 120ms ease, background 150ms ease;
    }

    .suggestion-chip:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--brand), var(--line) 50%);
      background: color-mix(in srgb, var(--panel), var(--brand) 8%);
    }

    .suggestion-chip strong {
      font-size: 14px;
    }

    .suggestion-chip span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .thread {
      display: grid;
      gap: 22px;
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .message {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .message.user {
      grid-template-columns: minmax(0, 1fr) 38px;
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      font-size: 13px;
      font-weight: 900;
    }

    .message.user .avatar {
      grid-column: 2;
      background: var(--panel-3);
      color: var(--text);
    }

    .bubble {
      min-width: 0;
      padding-top: 2px;
    }

    .message-content {
      display: grid;
      min-width: 0;
    }

    .message.user .message-content {
      grid-column: 1;
      justify-self: end;
      max-width: min(720px, 100%);
    }

    .message.user .bubble {
      padding: 12px 14px;
      border-radius: 16px;
      background: color-mix(in srgb, var(--brand), var(--panel) 82%);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      color: var(--subtle);
      font-size: 12px;
    }

    .mode-tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 7px;
      border-radius: 999px;
      color: color-mix(in srgb, var(--brand), white 20%);
      background: color-mix(in srgb, var(--brand), transparent 84%);
      font-size: 11px;
      font-weight: 900;
    }

    .message-body {
      color: var(--text);
      font-size: 15px;
      line-height: 1.72;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .message-body:empty::after {
      content: "正在思考...";
      color: var(--muted);
    }

    .message-quote {
      display: grid;
      gap: 4px;
      margin-bottom: 8px;
      padding: 8px 10px;
      border-left: 3px solid color-mix(in srgb, var(--brand), var(--brand-2) 28%);
      border-radius: 10px;
      background: color-mix(in srgb, var(--panel), var(--bg) 10%);
      color: var(--muted);
      text-align: left;
    }

    .message-quote strong {
      color: color-mix(in srgb, var(--text), var(--muted) 20%);
      font-size: 12px;
      font-weight: 900;
    }

    .message-quote span {
      display: -webkit-box;
      overflow: hidden;
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
      white-space: normal;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
    }

    .message-quote-media {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 4px;
    }

    .message-quote-thumb {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--muted);
    }

    button.message-quote-thumb {
      padding: 0;
    }

    .message-quote-thumb:hover,
    .message-quote-thumb:focus-visible {
      border-color: color-mix(in srgb, var(--brand), var(--line) 42%);
    }

    .message-quote-thumb img,
    .message-quote-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    video.message-quote-thumb {
      display: block;
    }

    .message-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-start;
      margin-top: 5px;
      color: var(--subtle);
      font-size: 12px;
    }

    .message.user .message-footer {
      justify-content: flex-end;
    }

    .message-footer-info,
    .message-footer-actions {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .message-action-button {
      display: inline-grid;
      place-items: center;
      width: 25px;
      height: 25px;
      border: 0;
      border-radius: 8px;
      color: var(--subtle);
      background: transparent;
    }

    .message-action-button:hover {
      color: var(--text);
      background: var(--panel-2);
    }

    .message-action-button svg {
      width: 17px;
      height: 17px;
    }

    .message-footer .debug-button {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .message-debug {
      min-width: 0;
      margin-top: 8px;
      border: 1px solid color-mix(in srgb, var(--brand), var(--line) 55%);
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel), var(--bg) 8%);
      color: var(--muted);
      overflow: hidden;
    }

    .message.user .message-debug {
      justify-self: stretch;
    }

    .message-debug summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      cursor: pointer;
      color: color-mix(in srgb, var(--text), var(--muted) 28%);
      font-size: 12px;
      font-weight: 900;
      list-style: none;
    }

    .message-debug summary::-webkit-details-marker {
      display: none;
    }

    .message-debug summary::after {
      content: "展开";
      color: var(--subtle);
      font-size: 11px;
      font-weight: 800;
    }

    .message-debug[open] summary::after {
      content: "收起";
    }

    .message-debug-body {
      display: grid;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .message-debug-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .message-debug-meta span {
      min-height: 22px;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .message-debug pre {
      max-height: 280px;
      margin: 0;
      padding: 10px;
      overflow: auto;
      border-radius: 10px;
      background: color-mix(in srgb, var(--bg), black 10%);
      color: color-mix(in srgb, var(--text), var(--muted) 18%);
      font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .message-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .debug-button,
    .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 10px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .debug-button:hover,
    .ghost-button:hover {
      color: var(--text);
      background: var(--panel-3);
    }

    .result-media {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .result-media img,
    .result-media video {
      display: block;
      width: min(100%, 720px);
      max-height: 520px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      object-fit: contain;
    }

    .thinking-block {
      display: grid;
      gap: 6px;
      width: 100%;
      margin: 0 0 6px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-left: 3px solid color-mix(in srgb, var(--brand), var(--brand-2) 30%);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel), var(--bg) 10%);
      color: var(--muted);
      text-align: left;
    }

    .thinking-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: color-mix(in srgb, var(--text), var(--muted) 18%);
      font-size: 13px;
      font-weight: 900;
    }

    .thinking-copy {
      max-height: calc(1.55em * 3);
      overflow: hidden;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .thinking-block[aria-expanded="true"] .thinking-copy {
      max-height: none;
    }

    .thinking-toggle-label {
      color: var(--subtle);
      font-size: 12px;
      font-weight: 800;
    }

    .task-progress {
      display: grid;
      gap: 8px;
      min-width: 0;
      max-width: 100%;
      margin-top: 12px;
      overflow: hidden;
    }

    .task-progress .meta {
      min-width: 0;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .task-ids {
      display: block;
      width: 100%;
      white-space: normal;
    }

    .progress-bar {
      min-width: 0;
      width: 100%;
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--panel-2);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      transition: width 220ms ease;
    }

    .composer-wrap {
      padding: 0 24px 18px;
    }

    .composer {
      display: grid;
      gap: 9px;
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: color-mix(in srgb, var(--panel), var(--bg) 6%);
      box-shadow: var(--shadow);
    }

    .mode-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .mode-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 12px;
      color: var(--muted);
      background: transparent;
      font-size: 14px;
      font-weight: 800;
      transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }

    .mode-pill[aria-pressed="true"] {
      color: color-mix(in srgb, var(--brand), white 18%);
      background: color-mix(in srgb, var(--brand), transparent 86%);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--brand), transparent 38%);
    }

    .composer-input-row {
      min-width: 0;
    }

    .composer-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
      min-width: 0;
    }

    .composer-left-tools,
    .composer-right-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .composer-left-tools {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr);
      grid-column: 1;
      align-items: center;
      max-width: 100%;
    }

    .composer-left-tools:not(:has(.composer-options:not([hidden]))) {
      grid-template-columns: auto auto auto;
      justify-content: start;
    }

    .composer-right-tools {
      grid-column: 2;
      justify-content: flex-end;
      margin-left: auto;
    }

    .quick-text-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .quick-text-options:not([hidden]) {
      display: contents;
    }

    .send-button {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      color: #fff;
      background: color-mix(in srgb, var(--brand), var(--panel-3) 18%);
      transition: transform 120ms ease, opacity 150ms ease;
    }

    .send-button:hover {
      transform: translateY(-1px);
    }

    .send-button[data-state="cancel"] {
      background: color-mix(in srgb, var(--danger), var(--panel-3) 10%);
    }

    .composer-options,
    .composer-toggle {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 36px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .composer-options {
      justify-self: start;
    }

    .composer-options[aria-expanded="true"],
    .composer-toggle:has(input:checked) {
      color: color-mix(in srgb, var(--brand), white 14%);
      border-color: color-mix(in srgb, var(--brand), var(--line) 28%);
      background: color-mix(in srgb, var(--brand), transparent 86%);
    }

    .composer-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .attachment-panel {
      display: grid;
      gap: 8px;
    }

    .composer-context {
      display: grid;
      gap: 8px;
    }

    .composer-context[hidden] {
      display: none;
    }

    .composer-context-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel), var(--bg) 8%);
    }

    .composer-context-main {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .composer-context-label {
      color: color-mix(in srgb, var(--brand), white 16%);
      font-size: 12px;
      font-weight: 900;
    }

    .composer-context-text {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-actions {
      display: contents;
    }

    .tool-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 13px;
      font-weight: 800;
      transition: background 150ms ease, color 150ms ease, transform 120ms ease;
    }

    .tool-button:hover {
      color: var(--text);
      background: var(--panel-3);
      transform: translateY(-1px);
    }

    .composer-right-tools .tool-button {
      position: relative;
      width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      border-radius: 999px;
    }

    .composer-right-tools .tool-button span {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .attachment-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .attachment-chip,
    .message-attachment {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel), var(--bg) 8%);
    }

    .attachment-chip {
      min-width: min(260px, 100%);
      border-color: color-mix(in srgb, var(--danger), var(--line) 25%);
    }

    .attachment-chip img {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      object-fit: cover;
      background: var(--panel-2);
    }

    .attachment-name,
    .message-attachment-name {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-size,
    .message-attachment-size {
      color: var(--subtle);
      font-size: 11px;
    }

    .message-attachments {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .message-attachment {
      grid-template-columns: 42px minmax(0, 1fr);
      max-width: 360px;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      text-align: left;
      transition: border-color 150ms ease, background 150ms ease, transform 120ms ease;
    }

    .message-attachment:hover,
    .message-attachment:focus-visible {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--brand), var(--line) 42%);
      background: color-mix(in srgb, var(--panel), var(--brand) 8%);
    }

    .message-attachment-preview,
    .message-attachment-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 9px;
      color: color-mix(in srgb, var(--brand), white 18%);
      background: color-mix(in srgb, var(--brand), transparent 86%);
      overflow: hidden;
    }

    .message-attachment-icon svg {
      width: 17px;
      height: 17px;
    }

    .message-attachment-preview img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
    }

    .image-modal-card {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      width: min(1020px, 100%);
      max-height: min(780px, calc(100vh - 48px));
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .image-modal-head {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      min-width: 0;
    }

    .image-modal-title-wrap {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .image-modal-title {
      min-width: 0;
      overflow: hidden;
      font-size: 14px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .image-modal-counter {
      color: var(--subtle);
      font-size: 12px;
      font-weight: 800;
    }

    .debug-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .image-modal-stage {
      display: grid;
      place-items: center;
      min-height: 0;
      overflow: auto;
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--bg), black 12%);
    }

    .image-modal-stage img {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 150px);
      object-fit: contain;
    }

    .simple-settings {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .composer-toolbar .composer-options {
      grid-column: 1;
      grid-row: 1;
    }

    .quick-text-options:not([hidden]) + .composer-options {
      grid-column: 2;
    }

    .composer-toolbar .simple-settings {
      grid-column: 1 / -1;
      grid-row: 2;
      width: 100%;
      margin-top: 2px;
      padding-top: 0;
      grid-template-columns: repeat(auto-fit, minmax(min(220px, 100%), 1fr));
    }

    .simple-settings > .advanced-fields {
      display: contents;
    }

    .simple-settings .wide {
      grid-column: span 2;
    }

    .simple-settings .full {
      grid-column: 1 / -1;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .field-help {
      color: var(--subtle);
      font-size: 11px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .field-help.warning {
      color: color-mix(in srgb, var(--danger), var(--muted) 20%);
    }

    .option-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .check {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--panel);
      font-size: 13px;
      font-weight: 800;
    }

    .check input {
      width: 16px;
      height: 16px;
      accent-color: var(--brand);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: min(420px, calc(100vw - 36px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .sidebar-backdrop {
      display: none;
    }

    .error-text {
      color: var(--danger);
    }

    @media (max-width: 1040px) {
      .suggestions {
        grid-template-columns: 1fr;
      }

      .simple-settings {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      body {
        overflow: hidden;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 30;
        width: min(86vw, var(--sidebar-w));
        transform: translateX(-105%);
        transition: transform 180ms ease;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .sidebar-backdrop {
        position: fixed;
        inset: 0;
        z-index: 25;
        display: block;
        background: rgba(0, 0, 0, 0.42);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      body.sidebar-open .sidebar-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      .main {
        height: 100vh;
        min-height: 0;
      }

      .mobile-topbar {
        display: flex;
      }

      .chat-header {
        display: none;
      }

      .messages {
        min-height: 0;
        padding: 18px 14px 24px;
      }

      .composer-wrap {
        max-height: calc(100vh - 76px);
        overflow: auto;
        padding: 0 12px 14px;
      }

      @supports (height: 100dvh) {
        .main {
          height: 100dvh;
        }

        .composer-wrap {
          max-height: calc(100dvh - 76px);
        }
      }
    }

    @media (max-width: 560px) {
      .message,
      .message.user {
        grid-template-columns: 1fr;
      }

      .avatar,
      .message.user .avatar {
        display: none;
      }

      .message.user .message-content {
        grid-column: auto;
      }

      .composer {
        border-radius: 18px;
      }

      .send-button {
        width: 44px;
      }

      .simple-settings {
        grid-template-columns: 1fr;
      }

      .simple-settings .wide {
        grid-column: auto;
      }

      .welcome h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="会话历史">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">A</div>
          <div class="brand-name">
            <strong>Agnes AI</strong>
            <span>创作聊天助手</span>
          </div>
        </div>
        <button class="icon-button mobile-close" id="closeSidebarButton" type="button" aria-label="关闭侧栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </div>

      <button class="new-chat-button" id="newChatButton" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
        开启新对话
      </button>

      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input class="input search-input" id="historySearchInput" type="search" placeholder="搜索历史对话">
      </div>

      <div class="history-list" id="historyList" aria-label="历史对话"></div>

      <div class="sidebar-footer">
        <div class="connection-card">
          <div class="connection-head">
            <div class="connection-title-wrap">
              <span class="connection-title">连接 Agnes</span>
              <button class="icon-button key-help-button" id="keyHelpButton" type="button" title="如何获取 API Key" aria-label="如何获取 API Key" aria-expanded="false" aria-controls="keyHelpPanel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><path d="M9.1 9a3 3 0 1 1 5.2 2c-.9.7-1.3 1.2-1.3 2.2"></path><path d="M12 17h.01"></path></svg>
              </button>
            </div>
            <button class="status-pill" id="keyStatus" type="button" title="点击检测 API Key"><span class="status-dot"></span><span>未连接</span></button>
          </div>
          <div class="key-help-panel" id="keyHelpPanel" role="note" hidden>
            <strong>如何获取 API Key</strong>
            <ol>
              <li>访问 <a href="https://platform.agnes-ai.com/login" target="_blank" rel="noopener noreferrer">Agnes 平台</a> 并注册或登录账号。</li>
              <li>进入“设置”，选择“密钥”。</li>
              <li>点击“创建新的密钥”。</li>
              <li>复制并保存好自己的密钥，然后粘贴到下方输入框。</li>
            </ol>
          </div>
          <div class="api-key-row">
            <input class="input" id="apiKeyInput" autocomplete="off" spellcheck="false" type="password" placeholder="粘贴 API Key">
            <button class="icon-button" id="toggleKeyButton" type="button" title="显示或隐藏 API Key" aria-label="显示或隐藏 API Key">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
            <button class="icon-button" id="clearKeyButton" type="button" title="清除 API Key" aria-label="清除 API Key">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>
            </button>
          </div>
        </div>
        <div class="debug-mode-card">
          <div class="debug-mode-copy">
            <strong>调试模式</strong>
            <span id="debugModeHint">关闭时只显示用户友好消息</span>
          </div>
          <button class="switch-button" id="debugModeToggle" type="button" aria-pressed="false" aria-label="开启调试模式" title="开启调试模式"></button>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="mobile-topbar">
        <button class="icon-button" id="openSidebarButton" type="button" aria-label="打开侧栏">

        await copyText(JSON.stringify(serializeSession(session).messages, null, 2));
        toast("对话记录已复制");

      els.composer.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (state.busy) {
          cancelGeneration();

        }
        const prompt = els.promptInput.value.trim();
        if (!prompt) {
          toast("请输入消息");

        if (!state.apiKey) {
          toast("请先在左侧粘贴 Agnes API Key");
          els.apiKeyInput.focus();

        try {
          beginGeneration();
          const quote = state.quotedMessage;
          await submitPrompt(prompt, state.editingMessageId, quote);

        } finally {

    function closeSidebar() {
      document.body.classList.remove("sidebar-open");
    }

    function createSession(render) {
      const session = {
        id: makeId(),
        title: "新的对话",
        createdAt: Date.now(),
        updatedAt: Date.now(),
        pinnedAt: 0,
        mode: "text",
        messages: [],
        settings: defaultSettings()
      };
      state.sessions.unshift(session);
      state.activeSessionId = session.id;
      state.mode = session.mode;
      state.attachments = emptyAttachments();
      state.editingMessageId = null;
      state.quotedMessage = null;
      applySettings(session.settings);
      saveSessions();
      if (render) {
        renderAll();
        closeSidebar();
        els.promptInput.focus();
      }
      return session;
    }

    function defaultSettings() {
      return {
        textTemperature: "0.7",
        textMaxTokens: "1024",
        textImageUrl: "",
        textThinking: false,
        imageSize: "1024x1024",
        imageOutput: "url",
        imageInputs: "",
        videoSize: "1280x720",
        videoDuration: "297:60",
        videoFrames: "297",
        videoFrameRate: "60",
        videoPollLimit: "60",
        videoImage: "",
        videoExtraImages: "",
        videoNegative: ""
      };
    }

    function loadSessions() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        state.sessions = Array.isArray(parsed.sessions) ? parsed.sessions : [];
        state.activeSessionId = parsed.activeSessionId || (state.sessions[0] && state.sessions[0].id) || null;
      } catch (error) {
        state.sessions = [];
        state.activeSessionId = null;
      }
      state.sessions = state.sessions
        .filter((session) => session && session.id)
        .map((session) => ({
          id: session.id,
          title: session.title || "新的对话",
          createdAt: session.createdAt || Date.now(),
          updatedAt: session.updatedAt || Date.now(),
          pinnedAt: Number(session.pinnedAt) || 0,
          mode: MODE_CONFIG[session.mode] ? session.mode : "text",
          messages: Array.isArray(session.messages) ? session.messages : [],
          settings: { ...defaultSettings(), ...(session.settings || {}) }
        }))
        .sort(compareSessions);
      if (state.activeSessionId && !state.sessions.some((session) => session.id === state.activeSessionId)) {
        state.activeSessionId = state.sessions[0] ? state.sessions[0].id : null;
      }
      const session = activeSession();
      if (session) {
        state.mode = session.mode;
        applySettings(session.settings);
      }
    }

    function saveSessions() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          activeSessionId: state.activeSessionId,
          sessions: state.sessions.slice(0, 80).map(serializeSession)
        }));
      } catch (error) {
        console.warn("Unable to save sessions", error);
      }
    }

    function serializeSession(session) {
      return {
        ...session,
        settings: { ...defaultSettings(), ...(session.settings || {}) },
        messages: (session.messages || []).map((message) => ({
          ...message,
          raw: sanitizeForStorage(message.raw),
          result: sanitizeResultForStorage(message.result),
          quote: sanitizeQuoteForStorage(message.quote),
          thinking: message.thinking || "",
          usage: message.usage || null,
          attachments: (message.attachments || []).map(sanitizeAttachmentForStorage)
        }))
      };
    }

    function sanitizeAttachmentForStorage(item) {
      const previewUrl = typeof item.previewUrl === "string" && item.previewUrl.startsWith("data:image/") ? "" : item.previewUrl || "";
      return {
        id: item.id,
        name: item.name,
        type: item.type,
        size: item.size || 0,
        previewUrl
      };
    }

    function sanitizeResultForStorage(result) {
      if (!result) return null;
      if (typeof result.url === "string" && result.url.startsWith("data:image/")) {
        return null;
      }
      return sanitizeForStorage(result);
    }

    function sanitizeQuote(quote) {
      if (!quote) return null;
      const content = String(quote.content || "").trim();
      return {
        id: quote.id || "",
        role: quote.role === "assistant" ? "assistant" : "user",
        mode: MODE_CONFIG[quote.mode] ? quote.mode : "text",
        content: content.slice(0, 1200),
        createdAt: quote.createdAt || new Date().toISOString(),
        attachments: (quote.attachments || []).map(normalizeQuoteAttachment).filter((item) => item.previewUrl),
        result: normalizeQuoteResult(quote.result)
      };
    }

    function sanitizeQuoteForStorage(quote) {
      if (!quote) return null;
      const clean = sanitizeQuote(quote);
      return {
        ...clean,
        attachments: (clean.attachments || []).map(sanitizeAttachmentForStorage).filter((item) => item.previewUrl),
        result: sanitizeResultForStorage(clean.result)
      };
    }

    function normalizeQuoteAttachment(item) {
      const previewUrl = item.previewUrl || item.dataUrl || "";
      return {
        id: item.id || makeId(),
        name: item.name || "图片",
        type: item.type || "image/*",
        size: item.size || 0,
        previewUrl
      };
    }

    function normalizeQuoteResult(result) {
      if (!result || !result.url) return null;
      return {
        kind: result.kind === "video" ? "video" : "image",
        url: result.url,
        downloadName: result.downloadName || ""
      };
    }

    function sanitizeForStorage(value) {
      if (value == null) return value;
      if (typeof value === "string") {
        if (value.startsWith("data:image/")) return "[local image omitted]";
        if (value.length > 16000) return value.slice(0, 12000) + "\n...[truncated]";
        return value;
      }
      if (Array.isArray(value)) return value.map(sanitizeForStorage);
      if (typeof value === "object") {
        return Object.fromEntries(Object.entries(value).map(([key, val]) => [key, sanitizeForStorage(val)]));
      }
      return value;
    }

    function activeSession() {
      return state.sessions.find((session) => session.id === state.activeSessionId) || null;
    }

    function activateSession(id) {
      const session = state.sessions.find((item) => item.id === id);
      if (!session) return;
      state.activeSessionId = id;
      state.openHistoryMenuId = null;
      state.renamingSessionId = null;
      state.editingMessageId = null;
      state.quotedMessage = null;
      state.mode = session.mode;
      state.attachments = emptyAttachments();
      applySettings(session.settings);
      saveSessions();
      renderAll();
      closeSidebar();
    }

    function deleteSession(id) {
      state.openHistoryMenuId = null;
      state.renamingSessionId = null;
      state.sessions = state.sessions.filter((session) => session.id !== id);
      if (!state.sessions.length) {
        createSession(false);
      } else if (state.activeSessionId === id) {
        state.sessions.sort(compareSessions);
        state.activeSessionId = state.sessions[0].id;
      }
      const session = activeSession();
      if (session) {
        state.mode = session.mode;
        state.attachments = emptyAttachments();
        state.editingMessageId = null;
        state.quotedMessage = null;
        applySettings(session.settings);
      }
      saveSessions();
      renderAll();
    }

    function closeHistoryMenu() {
      if (!state.openHistoryMenuId) return;
      state.openHistoryMenuId = null;
      renderHistory();
    }

    function renameSession(id, title) {
      if (state.renamingSessionId !== id) return;
      const session = state.sessions.find((item) => item.id === id);
      if (!session) return;
      const nextTitle = title.trim();
      if (!nextTitle) {
        state.renamingSessionId = null;
        renderHistory();
        return;
      }
      session.title = nextTitle.slice(0, 80);
      session.updatedAt = Date.now();
      state.renamingSessionId = null;
      state.openHistoryMenuId = null;
      saveSessions();
      renderAll();
      toast("已重命名对话");
    }

    function togglePinSession(id) {
      const session = state.sessions.find((item) => item.id === id);
      if (!session) return;
      session.pinnedAt = session.pinnedAt ? 0 : Date.now();
      session.updatedAt = Date.now();
      state.openHistoryMenuId = null;
      state.sessions.sort(compareSessions);
      saveSessions();
      renderAll();
      toast(session.pinnedAt ? "已置顶对话" : "已取消置顶");
    }

    function setMode(mode) {
      if (!MODE_CONFIG[mode]) return;
      if (state.mode !== mode) state.editingMessageId = null;
      state.mode = mode;
      const session = activeSession();
      if (session) {
        session.mode = mode;
        session.updatedAt = Date.now();
      }
      saveSessions();
      renderMode();
      renderComposerContext();
      renderAttachments();
      renderSuggestions();
      renderHistory();
    }

    async function submitPrompt(prompt, replaceFromId, quote) {
      if (replaceFromId) removeMessagesFrom(replaceFromId);
      const mode = state.mode;
      if (mode === "text") await handleText(prompt, quote);
      if (mode === "image") await handleImage(prompt, quote);
      if (mode === "video") await handleVideo(prompt, quote);
    }

    function removeMessagesFrom(id) {
      const session = activeSession();
      if (!session) return;
      const index = session.messages.findIndex((message) => message.id === id);
      if (index === -1) return;
      session.messages.splice(index);
      if (index === 0) session.title = "新的对话";
      session.updatedAt = Date.now();
      saveSessions();
      renderThread();
      renderHistory();
    }

    function renderAll() {
      renderMode();
      renderHistory();
      renderThread();
      renderAttachments();
      renderComposerContext();
      renderSuggestions();
      updateChatTitle();
    }

    function renderMode() {
      const config = MODE_CONFIG[state.mode];
      els.modePills.forEach((pill) => {
        pill.setAttribute("aria-pressed", String(pill.dataset.mode === state.mode));
      });
      els.promptInput.placeholder = config.placeholder;
      if (!state.busy) {
        els.sendButton.title = config.buttonLabel;
        els.sendButton.setAttribute("aria-label", config.buttonLabel);
      }
      const hasSimpleOptions = Array.from(els.simpleSettings.querySelectorAll("[data-simple-param]")).some((el) => el.dataset.simpleParam === state.mode);
      const hasExtraOptions = Array.from(els.advancedFields.querySelectorAll("[data-param]")).some((el) => el.dataset.param === state.mode);
      const hasOptions = hasSimpleOptions || hasExtraOptions;
      els.quickTextOptions.hidden = state.mode !== "text";
      if (!hasOptions) state.optionsOpen = false;
      els.optionsSettings.hidden = !hasOptions;
      els.optionsSettings.setAttribute("aria-expanded", String(state.optionsOpen));
      els.simpleSettings.hidden = !hasOptions || !state.optionsOpen;
      Array.from(els.simpleSettings.querySelectorAll("[data-simple-param]")).forEach((el) => {
        el.hidden = el.dataset.simpleParam !== state.mode;
      });
      Array.from(els.advancedFields.querySelectorAll("[data-param]")).forEach((el) => {
        el.hidden = el.dataset.param !== state.mode;
      });
      renderFieldLabels();
      renderOptionText();
      updateVideoDurationAvailability();
      renderAttachments();
    }

    function renderFieldLabels() {
      document.querySelectorAll("[data-basic-label][data-advanced-label]").forEach((node) => {
        node.textContent = node.dataset.basicLabel || node.textContent;
      });
    }

    function renderOptionText() {
      Object.entries(OPTION_TEXT).forEach(([id, modes]) => {
        const select = document.getElementById(id);
        if (!select) return;
        const labels = modes.basic;
        Array.from(select.options).forEach((option) => {
          option.textContent = labels[option.value] || option.textContent;
        });
      });
    }

    function renderSuggestions() {
      els.welcomeSuggestions.innerHTML = "";
      Object.entries(MODE_CONFIG).forEach(([mode, config]) => {
        const suggestion = config.suggestions[0];
        const button = document.createElement("button");
        button.type = "button";
        button.className = "suggestion-chip";
        button.dataset.mode = mode;
        button.dataset.prompt = suggestion.prompt;
        const title = document.createElement("strong");
        title.textContent = suggestion.title;
        const desc = document.createElement("span");
        desc.textContent = suggestion.desc;
        button.append(title, desc);
        els.welcomeSuggestions.appendChild(button);
      });
    }

    function renderHistory() {
      const sessions = filteredSessions();
      els.historyList.innerHTML = "";
      if (!sessions.length) {
        const empty = document.createElement("div");
        empty.className = "history-heading";
        empty.textContent = "没有匹配的历史";
        els.historyList.appendChild(empty);
        return;
      }
      const groups = groupSessions(sessions);
      Object.entries(groups).forEach(([label, items]) => {
        const group = document.createElement("section");
        group.className = "history-group";
        const heading = document.createElement("div");
        heading.className = "history-heading";
        heading.textContent = label;
        group.appendChild(heading);
        items.forEach((session) => {
          const row = document.createElement("div");
          row.className = [
            "history-row",
            session.id === state.activeSessionId ? "active" : "",
            session.id === state.openHistoryMenuId ? "menu-open" : ""
          ].filter(Boolean).join(" ");

          if (session.id === state.renamingSessionId) {
            const input = document.createElement("input");
            input.className = "history-rename-input";
            input.value = session.title || "新的对话";
            input.maxLength = 80;
            input.setAttribute("aria-label", "重命名对话");
            input.addEventListener("click", (event) => event.stopPropagation());
            input.addEventListener("keydown", (event) => {
              if (event.key === "Enter") renameSession(session.id, input.value);
              if (event.key === "Escape") {
                state.renamingSessionId = null;
                renderHistory();
              }
            });
            input.addEventListener("blur", () => renameSession(session.id, input.value));
            row.appendChild(input);
            setTimeout(() => {
              input.focus();
              input.select();
            }, 0);
          } else {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "history-item";
            if (session.pinnedAt) {
              const pin = document.createElement("span");
              pin.className = "history-pin";
              pin.setAttribute("aria-hidden", "true");
              pin.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"></path><path d="M8 3h8l-1 7 4 4v2H5v-2l4-4-1-7Z"></path></svg>';
              button.appendChild(pin);
            }
            const title = document.createElement("span");
            title.className = "history-title";
            title.textContent = session.title || "新的对话";
            button.appendChild(title);
            button.addEventListener("click", () => activateSession(session.id));
            row.appendChild(button);
          }

          const menuButton = document.createElement("button");
          menuButton.type = "button";
          menuButton.className = "icon-button history-menu-button";
          menuButton.title = "对话操作";
          menuButton.setAttribute("aria-label", "对话操作");
          menuButton.setAttribute("aria-expanded", String(session.id === state.openHistoryMenuId));
          menuButton.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="5" cy="12" r="1.8"></circle><circle cx="12" cy="12" r="1.8"></circle><circle cx="19" cy="12" r="1.8"></circle></svg>';
          menuButton.addEventListener("click", (event) => {
            event.stopPropagation();
            state.renamingSessionId = null;
            state.openHistoryMenuId = state.openHistoryMenuId === session.id ? null : session.id;
            renderHistory();
          });
          row.appendChild(menuButton);

          if (session.id === state.openHistoryMenuId) {
            row.appendChild(renderHistoryMenu(session));
          }
          group.appendChild(row);
        });
        els.historyList.appendChild(group);
      });
    }

    function renderHistoryMenu(session) {
      const menu = document.createElement("div");
      menu.className = "history-menu";
      menu.setAttribute("role", "menu");
      menu.addEventListener("click", (event) => event.stopPropagation());

      const rename = document.createElement("button");
      rename.type = "button";
      rename.className = "history-menu-item";
      rename.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg><span>重命名</span>';
      rename.addEventListener("click", () => {
        state.openHistoryMenuId = null;
        state.renamingSessionId = session.id;
        renderHistory();
      });

      const pin = document.createElement("button");
      pin.type = "button";

      del.addEventListener("click", () => deleteSession(session.id));

      menu.append(rename, pin, del);
      return menu;

    function filteredSessions() {
      const sessions = state.sessions.slice().sort(compareSessions);
      if (!state.historyQuery) return sessions;
      return sessions.filter((session) => {
        const lastUser = [...session.messages].reverse().find((msg) => msg.role === "user");
        const haystack = `${session.title || ""} ${lastUser ? lastUser.content : ""}`.toLowerCase();
        return haystack.includes(state.historyQuery);
      });
    }

    function groupSessions(sessions) {
      const today = startOfDay(Date.now());
      return sessions.reduce((groups, session) => {
        if (session.pinnedAt) {
          groups["置顶"] = groups["置顶"] || [];
          groups["置顶"].push(session);
          return groups;
        }
        const day = startOfDay(session.updatedAt);
        const diff = Math.round((today - day) / 86400000);
        const label = diff <= 0 ? "今天" : diff === 1 ? "昨天" : diff <= 30 ? "30 天内" : formatMonth(session.updatedAt);
        groups[label] = groups[label] || [];
        groups[label].push(session);
        return groups;
      }, {});
    }

    function compareSessions(a, b) {
      if ((a.pinnedAt || 0) !== (b.pinnedAt || 0)) return (b.pinnedAt || 0) - (a.pinnedAt || 0);
      return (b.updatedAt || 0) - (a.updatedAt || 0);
    }

    function updateChatTitle() {
      const session = activeSession();
      els.chatTitle.textContent = session ? session.title : "新的 Agnes 对话";
    }

    function loadStoredApiKey() {
      const localKey = localStorage.getItem(API_KEY_STORAGE_KEY) || "";
      if (localKey) {
        sessionStorage.removeItem(API_KEY_STORAGE_KEY);
        return localKey;
      }
      const legacySessionKey = sessionStorage.getItem(API_KEY_STORAGE_KEY) || "";
      if (legacySessionKey) {
        localStorage.setItem(API_KEY_STORAGE_KEY, legacySessionKey);
        sessionStorage.removeItem(API_KEY_STORAGE_KEY);
      }
      return legacySessionKey;
    }

    function loadStoredDebugMode() {
      return localStorage.getItem(DEBUG_MODE_STORAGE_KEY) === "1";

    function updateKeyStatus() {
      els.keyStatus.classList.toggle("ready", state.keyState === "valid");

      els.keyStatus.classList.toggle("invalid", state.keyState === "invalid");

        unknown: "未验证",
        checking: "检测中",
        valid: "已连接",
        invalid: "无效"
      }[state.keyState] || "未验证";
      els.keyStatus.querySelector("span:last-child").textContent = label;

      if (!state.apiKey) return;
      state.keyState = "valid";
      updateKeyStatus();
    }

    async function validateApiKey() {
      if (!state.apiKey) {
        toast("请先粘贴 Agnes API Key");
        els.apiKeyInput.focus();
        return;
      }
      if (state.keyState === "checking") return;
      state.keyState = "checking";
      updateKeyStatus();
      try {
        await fetchAgnes("/v1/chat/completions", {
          method: "POST",
          body: {
            model: TEXT_DEFAULT_MODEL,
            messages: [{ role: "user", content: "ping" }],
            max_tokens: 1,
            temperature: 0
          }
        });
        markApiKeyConnected();
        toast("Agnes 已连接");
      } catch (error) {
        state.keyState = error && error.status === 401 ? "invalid" : "unknown";
        updateKeyStatus();
        toast(error && error.status === 401 ? "API Key 无效或已过期" : "暂时无法检测 API Key，请稍后再试");
      }

    function beginGeneration() {
      state.abortController = typeof AbortController !== "undefined" ? new AbortController() : null;
      state.cancelRequested = false;
      setBusy(true);
    }

    function endGeneration() {
      state.abortController = null;
      state.cancelRequested = false;
      setBusy(false);
    }

    function cancelGeneration() {
      if (!state.busy) return;
      if (state.cancelRequested) return;
      state.cancelRequested = true;
      if (state.abortController) state.abortController.abort();
      markLatestAssistantCanceled();
      toast("已取消本次回复");
    }

    function markLatestAssistantCanceled() {
      const session = activeSession();
      const message = session ? [...session.messages].reverse().find((item) => item.role === "assistant" && item.status === "loading") : null;
      if (!message) return;
      const hasVideoTask = message.mode === "video" && message.task && (message.task.videoId || message.task.taskId);
      updateMessage(message.id, {
        status: "canceled",
        content: hasVideoTask
          ? "已停止等待视频结果。Agnes 端任务可能仍会继续生成；当前文档没有提供取消视频任务的接口。"
          : "已取消本次回复。"
      });
    }

    function currentSignal() {
      return state.abortController ? state.abortController.signal : undefined;
    }

    async function handleImageFileSelection(event) {
      const files = Array.from(event.target.files || []).filter((file) => file.type && file.type.startsWith("image/"));
      event.target.value = "";
      if (!files.length) return;
      const bucket = state.attachments || [];
      const remaining = Math.max(0, MAX_ATTACHMENTS - bucket.length);
      if (!remaining) {
        toast("最多可添加 " + MAX_ATTACHMENTS + " 张图片");
        return;
      }
      if (files.length > remaining) toast("最多可添加 " + MAX_ATTACHMENTS + " 张图片，已保留前 " + remaining + " 张");
      const accepted = files.slice(0, remaining);
      for (const file of accepted) {
        if (file.size > MAX_ATTACHMENT_BYTES) {
          toast(file.name + " 超过 8MB，已跳过");
          continue;
        }
        try {
          const dataUrl = await fileToDataUrl(file);
          bucket.push({
            id: makeId(),
            name: file.name || "本地图片",
            type: file.type || "image/png",
            size: file.size || 0,
            dataUrl
          });
        } catch (error) {
          toast("读取图片失败：" + (file.name || "本地图片"));
        }
      }
      state.attachments = bucket;
      renderAttachments();
    }

      els.uploadImagesLabel.textContent = items.length ? "添加图片 (" + items.length + "/" + MAX_ATTACHMENTS + ")" : "添加图片";
      els.attachmentList.hidden = !items.length;

    function removeAttachment(id) {
