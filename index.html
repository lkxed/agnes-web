    function attachmentMetas(mode, urlText, options = {}) {
      const includeLocal = options.includeLocal !== false;
      const local = includeLocal ? (state.attachments || []).map(({ id, name, type, size, dataUrl }) => ({
        id,
        name,
        type,
        size,
        previewUrl: dataUrl
      })) : [];
      const remote = splitList(urlText || "").map((url, index) => ({
        id: "url-" + mode + "-" + index + "-" + makeId(),
        name: shortUrlName(url),
        type: "image/url",
        size: 0,
        previewUrl: url
      }));
      return [...remote, ...local];
    }

    function attachmentDataUrls() {
      return (state.attachments || []).map((item) => item.dataUrl).filter(Boolean);
    }

    function collectImages(mode, urlText) {
      return [...splitList(urlText || ""), ...attachmentDataUrls()];
    }

    function collectImageUrls(urlText) {
      return splitList(urlText || "");
    }

    async function uploadReferenceImages(items, messageId, label) {
      const uploads = [];
      for (let index = 0; index < items.length; index += 1) {
        const item = items[index];
        updateMessage(messageId, { content: "正在上传" + label + " " + String(index + 1) + " / " + String(items.length) + "..." }, true);
        uploads.push(await uploadImageToHost(item));
      }
      return uploads;
    }

    async function uploadImageToHost(item) {
      if (!item || !item.dataUrl) throw new Error("图床上传失败：没有可上传的本地图片。");
      const blob = await dataUrlToBlob(item.dataUrl);
      const form = new FormData();
      form.set("image", blob, safeUploadName(item.name || "agnes-reference.png", blob.type));
      form.set("cdn_domain", "img.scdn.io");
      let response;
      try {
        response = await fetch(IMAGE_HOST_UPLOAD_URL, {
          method: "POST",
          body: form,
          signal: currentSignal()
        });
      } catch (error) {
        if (isAbortError(error)) throw error;
        const err = new Error("图床上传失败：网络请求没有成功。请检查网络或浏览器跨域限制。详情：" + error.message);
        err.raw = {
          type: "image_host_network_error",
          endpoint: IMAGE_HOST_UPLOAD_URL,
          method: "POST",
          file: item.name || "agnes-reference.png",
          message: error.message,
          created_at: new Date().toISOString()
        };
        throw err;
      }
      const text = await response.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : {};
      } catch (error) {
        const err = new Error("图床上传失败：响应不是有效 JSON。");
        err.raw = {
          type: "image_host_invalid_json",
          endpoint: IMAGE_HOST_UPLOAD_URL,
          method: "POST",
          status: response.status,
          body: text
        };
        throw err;
      }
      if (!response.ok) {
        const err = new Error("图床上传失败：" + (data.message || data.error || response.statusText || String(response.status)));
        err.status = response.status;
        err.raw = {
          type: "image_host_http_error",
          endpoint: IMAGE_HOST_UPLOAD_URL,
          method: "POST",
          status: response.status,
          status_text: response.statusText,
          body: data
        };
        throw err;
      }
      if (data && data.success === false) {
        const err = new Error("图床上传失败：" + (data.message || data.error || "上传接口返回失败"));
        err.raw = {
          type: "image_host_upload_error",
          endpoint: IMAGE_HOST_UPLOAD_URL,
          method: "POST",
          body: data
        };
        throw err;
      }
      const url = (data && data.data && data.data.url) || (data && data.url) || "";
      if (!url) {
        const err = new Error("图床上传失败：响应中没有 url 或 data.url。");
        err.raw = {
          type: "image_host_missing_url",
          endpoint: IMAGE_HOST_UPLOAD_URL,
          method: "POST",
          body: data
        };
        throw err;
      }
      return { url, raw: data };
    }

    async function dataUrlToBlob(dataUrl) {
      const response = await fetch(dataUrl);
      if (!response.ok) throw new Error("读取本地图片失败。");
      return response.blob();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("File read failed"));
        reader.readAsDataURL(file);
      });
    }

    async function handleText(prompt, quote) {
      const textImageUrl = els.textImageUrl.value;
      const textImages = [...collectImages("text", textImageUrl), ...quoteImageUrls(quote)];
      const promptForApi = promptWithQuote(prompt, quote);
      const userMessage = appendMessage({ mode: "text", role: "user", status: "done", content: prompt, quote, attachments: attachmentMetas("text", textImageUrl) });
      const assistant = appendMessage({ mode: "text", role: "assistant", status: "loading", content: "" });
      clearComposerAfterSend();
      const content = buildTextContent(promptForApi, textImages);
      const hasImages = textImages.length > 0;
      const useThinking = !hasImages && els.textThinking.checked;
      const payload = {
        model: hasImages ? TEXT_IMAGE_MODEL : TEXT_DEFAULT_MODEL,
        messages: buildChatMessages(content, userMessage.id),
        temperature: numberOrDefault(els.textTemperature.value, 0.7),
        max_tokens: Math.max(1, parseInt(els.textMaxTokens.value, 10) || 1024)
      };
      if (useThinking) {
        payload.stream = true;
        payload.chat_template_kwargs = { enable_thinking: true };
      }
      userMessage.raw = sanitizeForStorage(payload);
      saveActive();
      if (payload.stream) {
        await streamTextCompletion(payload, assistant.id);
      } else {
        const data = await fetchAgnes("/v1/chat/completions", { method: "POST", body: payload });
        const message = data && data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message : {};
        const answer = message.content || "";
        const thinking = message.reasoning_content || message.reasoning || message.thinking || "";
        updateMessage(assistant.id, {
          status: "done",
          content: answer || "没有返回文本内容。",
          thinking,
          usage: data.usage || null,
          raw: data
        });
      }
    }

    function clearComposerAfterSend() {
      els.promptInput.value = "";
      state.editingMessageId = null;
      state.quotedMessage = null;
      renderComposerContext();
      clearModeAttachments();
    }

    function buildTextContent(prompt, imageUrls) {
      if (!imageUrls.length) return prompt;
      return [
        { type: "text", text: prompt },
        ...imageUrls.map((url) => ({ type: "image_url", image_url: { url } }))
      ];
    }

    function promptWithQuote(prompt, quote) {
      const cleanPrompt = String(prompt || "").trim();
      if (!quote) return cleanPrompt;
      const mediaLines = quoteMediaLines(quote);
      return [
        "请参考下面这条被引用的消息，再回答我的新消息。",
        "",
        "【引用消息】",
        quoteLabel(quote) + "：",
        quote.content || "（无文本内容）",
        mediaLines ? "\n【引用媒体】\n" + mediaLines : "",
        "",
        "【我的新消息】",
        cleanPrompt
      ].filter(Boolean).join("\n");
    }

    function quoteMediaLines(quote) {
      return quoteMediaItems(quote)
        .map((item) => {
          if (item.url && !item.url.startsWith("data:")) return (item.kind === "video" ? "视频：" : "图片：") + item.url;
          return item.kind === "video" ? "包含一个视频结果" : "包含一张图片";
        })
        .join("\n");
    }

    function quoteImageUrls(quote) {
      return quoteMediaItems(quote)
        .filter((item) => item.kind === "image" && item.url)
        .map((item) => item.url);
    }

    function quoteLocalImageAttachments(quote) {
      return quoteMediaItems(quote)
        .filter((item) => item.kind === "image" && item.url && item.url.startsWith("data:image/"))
        .map((item) => ({
          id: makeId(),
          name: item.name || "引用图片",
          type: "image/png",
          size: 0,
          dataUrl: item.url
        }));
    }

    function quoteMediaItems(quote) {
      if (!quote) return [];
      const items = [];
      (quote.attachments || []).forEach((item) => {
        if (item.previewUrl) items.push({ kind: "image", url: item.previewUrl, name: item.name || "引用图片" });
      });
      if (quote.result && quote.result.url) {
        items.push({ kind: quote.result.kind === "video" ? "video" : "image", url: quote.result.url, name: quote.result.downloadName || "引用结果" });
      }
      const seen = new Set();
      return items.filter((item) => {
        const key = item.kind + ":" + item.url;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function buildChatMessages(content, excludeId) {
      const session = activeSession();
      const prior = (session ? session.messages : [])
        .filter((msg) => msg.id !== excludeId && msg.mode === "text" && msg.status === "done" && (msg.role === "user" || msg.role === "assistant"))
        .slice(-10)
        .map((msg) => ({ role: msg.role, content: msg.content }));
      prior.push({ role: "user", content });
      return prior;
    }

    async function streamTextCompletion(payload, messageId) {
      const response = await fetch(API_BASE + "/v1/chat/completions", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify(payload),
        signal: currentSignal()
      });
      if (!response.ok) throw await responseError(response, "/v1/chat/completions", "POST");
      markApiKeyConnected();
      if (!response.body) throw new Error("浏览器不支持流式响应读取。");
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fullText = "";
      let thinkingText = "";
      let lastRaw = null;
      let usage = null;
      let done = false;
      while (!done) {
        const chunk = await reader.read();
        done = chunk.done;
        buffer += decoder.decode(chunk.value || new Uint8Array(), { stream: !done });
        const parts = buffer.split("\n");
        buffer = parts.pop() || "";
        for (const line of parts) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith("data:")) continue;
          const data = trimmed.slice(5).trim();
          if (data === "[DONE]") {
            done = true;
            break;
          }
          try {
            const json = JSON.parse(data);
            lastRaw = json;
            if (json.usage) usage = json.usage;
            const delta = json.choices && json.choices[0] && json.choices[0].delta;
            const content = delta && delta.content ? delta.content : "";
            const thinking = delta && (delta.reasoning_content || delta.reasoning || delta.thinking || "");
            if (content || thinking) {
              fullText += content;
              thinkingText += thinking;
              updateMessage(messageId, { content: fullText, thinking: thinkingText, usage, status: "loading", raw: json }, true);
            }
          } catch (error) {
            console.warn("Skipping stream chunk", error);
          }
        }
      }
      updateMessage(messageId, {
        content: fullText || "流式响应结束，但没有返回文本内容。",
        thinking: thinkingText,
        usage,
        raw: lastRaw,
        status: "done"
      });
    }

    async function handleImage(prompt, quote) {
      const promptForApi = promptWithQuote(prompt, quote);
      const imageInputs = els.imageInputs.value;
      const localImages = [...(state.attachments || []), ...quoteLocalImageAttachments(quote)];
      const remoteImages = [...collectImageUrls(imageInputs), ...quoteImageUrls(quote).filter((url) => !url.startsWith("data:image/"))];
      const userMessage = appendMessage({ mode: "image", role: "user", status: "done", content: prompt, quote, attachments: attachmentMetas("image", imageInputs) });
      const assistant = appendMessage({
        mode: "image",
        role: "assistant",
        status: "loading",
        content: localImages.length ? "正在准备本地参考图..." : "正在创作图片，请稍等..."
      });
      clearComposerAfterSend();
      const uploadedImages = localImages.length ? await uploadReferenceImages(localImages, assistant.id, "参考图") : [];
      const inputImages = [...remoteImages, ...uploadedImages.map((item) => item.url)];
      if (localImages.length) {
        updateMessage(assistant.id, { content: "参考图已准备好，正在创作图片..." }, true);
      }
      const output = els.imageOutput.value;
      const payload = {
        model: "agnes-image-2.1-flash",
        prompt: promptForApi,
        size: els.imageSize.value || "1024x1024"
      };
      if (inputImages.length) {
        payload.extra_body = { image: inputImages, response_format: output === "base64" ? "b64_json" : "url" };
      } else if (output === "base64") {
        payload.return_base64 = true;
      } else {
        payload.extra_body = { response_format: "url" };
      }
      userMessage.raw = sanitizeForStorage(payload);
      saveActive();
      const data = await fetchAgnes("/v1/images/generations", { method: "POST", body: payload });
      const first = data && data.data && data.data[0] ? data.data[0] : {};
      const url = first.url || "";
      const b64 = first.b64_json || "";
      if (!url && !b64) {
        updateMessage(assistant.id, { status: "done", content: "图片已经处理完成，但这次没有拿到可预览的结果。可以换个描述后再试。", raw: data });
        return;
      }
      updateMessage(assistant.id, {
        status: "done",
        content: url ? "图片创作完成。" : "图片创作完成，已返回可下载图片数据。",
        raw: data,
        result: {
          kind: "image",
          url: url || "data:image/png;base64," + b64,
          downloadName: "agnes-image.png"
        }
      });
    }

    async function handleVideo(prompt, quote) {
      const promptForApi = promptWithQuote(prompt, quote);
      const imageFields = [els.videoImage.value, els.videoExtraImages.value].join("\n");
      const localImages = [...(state.attachments || []), ...quoteLocalImageAttachments(quote)];
      const remoteImages = [...collectImageUrls(imageFields), ...quoteImageUrls(quote).filter((url) => !url.startsWith("data:image/"))];
      const userMessage = appendMessage({ mode: "video", role: "user", status: "done", content: prompt, quote, attachments: attachmentMetas("video", imageFields) });
      const assistant = appendMessage({
        mode: "video",
        role: "assistant",
        status: "loading",
        content: localImages.length ? "正在上传本地参考图..." : "正在开始制作视频..."
      });
      clearComposerAfterSend();
      const uploadedImages = localImages.length ? await uploadReferenceImages(localImages, assistant.id, "参考图") : [];
      const inputImages = [...remoteImages, ...uploadedImages.map((item) => item.url)];
      if (localImages.length) {
        updateMessage(assistant.id, { content: "参考图已上传，正在开始制作视频..." }, true);
      }
      const payload = {
        model: "agnes-video-v2.0",
        prompt: promptForApi,
        ...getVideoTiming()
      };
      const [width, height] = (els.videoSize.value || "1280x720").split("x").map((value) => parseInt(value, 10));
      payload.width = width;
      payload.height = height;
      if (inputImages.length === 1) payload.image = inputImages[0];
      if (inputImages.length > 1) payload.extra_body = { image: inputImages };
      const negative = els.videoNegative.value.trim();
      if (negative) payload.negative_prompt = negative;
      userMessage.raw = sanitizeForStorage(payload);
      saveActive();
      const task = await fetchAgnes("/v1/videos", { method: "POST", body: payload });
      const videoId = task.video_id;
      const taskId = task.task_id || task.id;
      updateMessage(assistant.id, {
        status: "loading",
        content: "视频已经开始制作，我会自动等待结果...",
        raw: task,
        task: {
          videoId,
          taskId,
          status: task.status || "queued",
          progress: task.progress || 0
        }
      });
      if (!videoId && !taskId) {
        updateMessage(assistant.id, { status: "done", content: "视频任务已创建，但没有拿到可自动查询的编号。可以稍后重新尝试。", raw: task });
        return;
      }
      await pollVideoResult(assistant.id, videoId, taskId);
    }

    async function pollVideoResult(messageId, videoId, taskId) {
      const limit = Math.min(120, Math.max(1, parseInt(els.videoPollLimit.value, 10) || 60));
      let last = null;
      for (let attempt = 1; attempt <= limit; attempt += 1) {
        await wait(attempt === 1 ? 1500 : 5000, currentSignal());
        const path = videoId
          ? "/agnesapi?video_id=" + encodeURIComponent(videoId) + "&model_name=agnes-video-v2.0"
          : "/v1/videos/" + encodeURIComponent(taskId);
        const data = await fetchAgnes(path, { method: "GET" });
        last = data;
        const status = data.status || "unknown";
        const progress = typeof data.progress === "number" ? data.progress : Math.min(99, Math.round((attempt / limit) * 100));
        updateMessage(messageId, {
          status: "loading",
          content: "视频还在生成中：" + statusLabel(status) + "（" + progress + "%）",
          raw: data,
          task: {
            videoId: data.video_id || videoId,
            taskId: data.task_id || data.id || taskId,
            status,
            progress
          }
        }, true);
        if (status === "completed") {
          const videoUrl = data.remixed_from_video_id || data.video_url || data.url || "";
          updateMessage(messageId, {
            status: "done",
            content: videoUrl ? "视频创作完成。" : "视频创作完成，但这次没有拿到可播放地址。",
            raw: data,
            task: {
              videoId: data.video_id || videoId,
              taskId: data.task_id || data.id || taskId,
              status,
              progress: 100
            },
            result: videoUrl ? { kind: "video", url: videoUrl, downloadName: "agnes-video.mp4" } : null
          });
          return;
        }
        if (status === "failed") {
          updateMessage(messageId, {
            status: "error",
            content: formatVideoFailure(data),
            raw: data
          });
          return;
        }
      }
      updateMessage(messageId, {
        status: "done",
        content: "等待时间到了，视频可能还在制作中。可以稍后再试。",
        raw: last
      });
    }

    async function fetchAgnes(path, options) {
      const init = {
        method: options.method || "GET",
        headers: authHeaders()
      };
      const signal = currentSignal();
      if (signal) init.signal = signal;
      if (options.body !== undefined) init.body = typeof options.body === "string" ? options.body : JSON.stringify(options.body);
      let response;
      try {
        response = await fetch(API_BASE + path, init);
      } catch (error) {
        if (isAbortError(error)) throw error;
        const err = new Error("网络请求失败。请检查网络、API 地址，或浏览器是否阻止跨域请求。详情：" + error.message);
        err.raw = {
          type: "network_error",
          endpoint: API_BASE + path,
          method: init.method,
          message: error.message,
          created_at: new Date().toISOString()
        };
        throw err;
      }
      if (!response.ok) throw await responseError(response, path, init.method);
      markApiKeyConnected();
      const text = await response.text();
      if (!text) return {};
      try {
        return JSON.parse(text);
      } catch (error) {
        const err = new Error("响应不是有效 JSON。");
        err.raw = text;
        throw err;
      }
    }

    function authHeaders() {
      return {
        "Authorization": "Bearer " + state.apiKey,
        "Content-Type": "application/json"
      };
    }

    async function responseError(response, path, method) {
      const text = await response.text();
      let detail = text;
      let body = text;
      try {
        const json = JSON.parse(text);
        body = json;
        detail = extractErrorReason(json) || JSON.stringify(json, null, 2);
      } catch (error) {
        detail = text || response.statusText;
      }
      const err = new Error("Agnes API 返回 " + response.status + "：" + detail);
      err.raw = {
        type: "http_error",
        endpoint: API_BASE + path,
        method,
        status: response.status,
        status_text: response.statusText,
        body
      };
      err.status = response.status;
      if (response.status === 401) {
        state.keyState = "invalid";
        updateKeyStatus();
      }
      return err;
    }

    function appendMessage(partial) {
      const session = activeSession() || createSession(false);
      const message = {
        id: makeId(),
        mode: partial.mode || state.mode,
        role: partial.role,
        content: partial.content || "",
        status: partial.status || "done",
        createdAt: new Date().toISOString(),
        raw: partial.raw || null,
        result: partial.result || null,
        task: partial.task || null,
        quote: sanitizeQuote(partial.quote),
        attachments: Array.isArray(partial.attachments) ? partial.attachments : [],
        thinking: partial.thinking || "",
        usage: partial.usage || null
      };
      session.messages.push(message);
      if (message.role === "user" && (session.title === "新的对话" || !session.title)) {
        session.title = makeTitle(message.content);
      }
      session.mode = state.mode;
      session.settings = readSettings();
      session.updatedAt = Date.now();
      moveActiveToTop();
      saveSessions();
      renderThread();
      renderHistory();
      updateChatTitle();
      return message;
    }

    function updateMessage(id, patch, shallow) {
      const session = activeSession();
      if (!session) return;
      const message = session.messages.find((item) => item.id === id);
      if (!message) return;
      Object.assign(message, patch);
      session.updatedAt = Date.now();
      moveActiveToTop();
      saveSessions();
      if (!shallow || !updateLiveMessage(message)) renderThread();
      renderHistory();
      updateChatTitle();
      scrollToBottom();
    }

    async function copyMessage(message) {
      await copyText(messageCopyText(message));
      toast("消息已复制");
    }

    async function copyErrorDetails(message) {
      await copyText(JSON.stringify(buildDeveloperInfo(message), null, 2));
      toast("错误详情已复制");
    }

    function messageCopyText(message) {
      const lines = [];
      if (message.quote) lines.push("引用：" + quoteLabel(message.quote) + "\n" + quotePreviewText(message.quote));
      if (message.content) lines.push(message.content);
      if (message.result && message.result.url) {
        if (message.result.url.startsWith("data:image/")) {
          lines.push("图片结果为 Base64 数据，可在页面中预览。");
        } else {
          lines.push((message.result.kind === "video" ? "视频：" : "图片：") + message.result.url);
        }
      }
      const urls = (message.attachments || [])
        .map((item) => item.previewUrl)
        .filter((url) => url && !url.startsWith("data:image/"));
      if (urls.length) lines.push("参考图：\n" + urls.join("\n"));
      if (message.task) {
        const ids = [message.task.videoId ? "video_id: " + message.task.videoId : "", message.task.taskId ? "task_id: " + message.task.taskId : ""].filter(Boolean);
        if (ids.length) lines.push(ids.join("\n"));
      }
      return lines.join("\n\n") || "空消息";
    }

    function startQuoteMessage(id) {
      if (state.busy) {
        toast("当前还在生成中，请稍后再引用");
        return;
      }
      const session = activeSession();
      const message = session && session.messages.find((item) => item.id === id);
      if (!message) return;
      state.quotedMessage = createQuoteSnapshot(message);
      els.promptInput.focus();
      renderComposerContext();
      toast("已引用这条消息");
    }

    function startEditMessage(id) {
      if (state.busy) {
        toast("当前还在生成中，请稍后再编辑");
        return;
      }
      const session = activeSession();
      const message = session && session.messages.find((item) => item.id === id);
      if (!message || message.role !== "user") return;
      setMode(message.mode);
      restoreMessageInputs(message);
      state.editingMessageId = message.id;
      state.quotedMessage = sanitizeQuote(message.quote);
      els.promptInput.value = message.content || "";
      els.promptInput.focus();
      renderComposerContext();
      toast("已进入编辑模式，修改后发送即可重新生成");
    }

    function cancelEditMessage() {
      state.editingMessageId = null;
      state.quotedMessage = null;
      els.promptInput.value = "";
      state.attachments = emptyAttachments();
      renderAttachments();
      renderComposerContext();
      toast("已取消编辑");
    }

    function clearQuotedMessage() {
      state.quotedMessage = null;
      renderComposerContext();
    }

    function createQuoteSnapshot(message) {
      return sanitizeQuote({
        id: message.id,
        role: message.role,
        mode: message.mode,
        content: quotePreviewText(message),
        createdAt: message.createdAt,
        attachments: message.attachments || [],
        result: message.result || null
      });
    }

    function quotePreviewText(messageOrQuote) {
      if (!messageOrQuote) return "";
      if (messageOrQuote.content) return String(messageOrQuote.content).trim();
      const result = messageOrQuote.result;
      if (result && result.kind === "image") return "图片结果";
      if (result && result.kind === "video") return "视频结果";
      if (messageOrQuote.task) return "视频任务：" + statusLabel(messageOrQuote.task.status || "unknown");
      const attachments = messageOrQuote.attachments || [];
      if (attachments.length) return "包含 " + attachments.length + " 张参考图";
      return "（无文本内容）";
    }

    function quoteLabel(quote) {
      const role = quote && quote.role === "assistant" ? "Agnes" : "你";
      const mode = quote && MODE_CONFIG[quote.mode] ? MODE_CONFIG[quote.mode].tag : "消息";
      return role + " · " + mode;
    }

    function renderComposerContext() {
      els.composerContext.innerHTML = "";
      const cards = [];
      if (state.quotedMessage) {
        cards.push(createComposerContextCard("引用 " + quoteLabel(state.quotedMessage), quotePreviewText(state.quotedMessage), clearQuotedMessage, "取消引用"));
      }
      cards.forEach((card) => els.composerContext.appendChild(card));
      els.composerContext.hidden = !cards.length;
    }

    function createComposerContextCard(label, text, onClose, closeLabel) {
      const card = document.createElement("div");
      card.className = "composer-context-card";
      const main = document.createElement("div");
      main.className = "composer-context-main";
      const labelEl = document.createElement("div");
      labelEl.className = "composer-context-label";
      labelEl.textContent = label;
      const textEl = document.createElement("div");
      textEl.className = "composer-context-text";
      textEl.textContent = text || "（无文本内容）";
      main.append(labelEl, textEl);
      if (state.quotedMessage && label.startsWith("引用 ")) {
        const media = renderQuoteMedia(state.quotedMessage);
        if (media) main.appendChild(media);
      }
      const close = document.createElement("button");
      close.type = "button";
      close.className = "icon-button";
      close.title = closeLabel;
      close.setAttribute("aria-label", closeLabel);
      close.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>';
      close.addEventListener("click", onClose);
      card.append(main, close);
      return card;
    }


    function restoreMessageInputs(message) {
      const urls = [];
      const local = [];
      (message.attachments || []).forEach((item) => {
        const previewUrl = item.previewUrl || "";
        if (previewUrl.startsWith("data:image/")) {
          local.push({
            id: makeId(),
            name: item.name || "本地图片",
            type: item.type || "image/*",
            size: item.size || 0,
            dataUrl: previewUrl
          });
        } else if (previewUrl) {
          urls.push(previewUrl);
        }
      });
      state.attachments = local.slice(0, MAX_ATTACHMENTS);
      if (message.mode === "text") els.textImageUrl.value = urls.join("\n");
      if (message.mode === "image") els.imageInputs.value = urls.join("\n");
      if (message.mode === "video") {
        els.videoImage.value = urls[0] || "";
        els.videoExtraImages.value = urls.slice(1).join("\n");
      }
      renderAttachments();
      if ((message.attachments || []).length && !local.length && !urls.length) {
        toast("这条消息里的本地图片没有长期保存，需要重新上传");
      }
    }

    function showRequestError(error) {
      const session = activeSession();
      const loading = session ? [...session.messages].reverse().find((message) => message.role === "assistant" && message.status === "loading") : null;
      const patch = {
        status: "error",
        content: formatError(error),
        raw: debugErrorDetails(error)
      };
      if (loading) updateMessage(loading.id, patch);
      else appendMessage({ mode: state.mode, role: "assistant", ...patch });
    }

    function renderThread() {
      const session = activeSession();
      const hasMessages = Boolean(session && session.messages.length);
      els.emptyState.hidden = hasMessages;
      els.thread.hidden = !hasMessages;
      els.thread.innerHTML = "";
      if (session) session.messages.forEach((message) => els.thread.appendChild(renderMessage(message)));
      scrollToBottom();
    }

    function renderMessage(message) {
      const article = document.createElement("article");
      article.className = "message " + message.role;
      article.dataset.messageId = message.id;
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = message.role === "user" ? "你" : "A";
      const content = document.createElement("div");
      content.className = "message-content";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      const body = document.createElement("div");
      body.className = "message-body";
      body.textContent = message.content || "";
      bubble.appendChild(body);
      if (message.quote) bubble.insertBefore(renderQuoteBlock(message.quote), body);
      if (message.thinking) bubble.insertBefore(renderThinking(message.thinking), body);
      if (message.attachments && message.attachments.length) bubble.appendChild(renderMessageAttachments(message.attachments));
      if (message.task) bubble.appendChild(renderTask(message.task));
      if (message.result) bubble.appendChild(renderResult(message.result));
      content.append(bubble, renderMessageFooter(message));
      const debugDetails = renderDeveloperDetails(message);
      if (debugDetails) content.appendChild(debugDetails);
      article.append(avatar, content);
      return article;
    }

    function renderMessageFooter(message) {
      const footer = document.createElement("div");
      footer.className = "message-footer";
      const info = document.createElement("div");
      info.className = "message-footer-info";
      const time = document.createElement("span");
      time.textContent = formatMessageTime(message.createdAt);
      time.title = formatExactTime(message.createdAt);
      info.appendChild(time);
      const usage = formatUsage(message.usage);

      }

      actions.className = "message-footer-actions";
      actions.appendChild(renderMessageAction("引用", "quote", () => startQuoteMessage(message.id)));

        actions.appendChild(createTextButton("复制错误详情", () => copyErrorDetails(message)));
      }
      if (message.role === "user") {
        actions.appendChild(renderMessageAction("编辑", "edit", () => startEditMessage(message.id)));
      }
      if (message.result && message.result.url) {
        actions.appendChild(createTextButton("新标签页打开", () => openInNewTab(message.result.url)));
      }
      footer.append(info, actions);

    function renderDeveloperDetails(message, forceOpen) {
      if (!state.debugMode) return null;
      const info = buildDeveloperInfo(message);
      const details = document.createElement("details");
      details.className = "message-debug";
      details.open = forceOpen !== undefined ? Boolean(forceOpen) : message.status === "error";

      [
        "role=" + info.role,
        "mode=" + info.mode,
        "status=" + info.status
      ].forEach((text) => {
        const pill = document.createElement("span");
        pill.textContent = text;
        meta.appendChild(pill);
      });
      if (info.http_status) {

      });

      details.append(summary, body);

    function buildDeveloperInfo(message) {
      const raw = message.raw || null;
      const info = {
        id: message.id,
        role: message.role,
        mode: message.mode,
        status: message.status,
        created_at: message.createdAt
      };
      const httpStatus = findHttpStatus(raw);
      if (httpStatus) info.http_status = httpStatus;
      if (message.status === "error") {
        const reason = extractErrorReason(raw);
        if (reason) info.error_reason = reason;
      }
      if (message.usage) info.usage = message.usage;
      if (message.task) info.task = message.task;
      if (message.result) info.result = summarizeDebugResult(message.result);
      if (message.attachments && message.attachments.length) {
        info.attachments = message.attachments.map((item) => ({
          name: item.name || "",
          type: item.type || "",
          size: item.size || 0,
          source: item.previewUrl && item.previewUrl.startsWith("data:") ? "local_data_url" : item.previewUrl || ""
        }));
      }
      if (raw) info.raw = raw;
      return sanitizeForStorage(info);
    }

    function summarizeDebugResult(result) {
      return {
        kind: result.kind || "",
        url: typeof result.url === "string" && result.url.startsWith("data:image/") ? "[base64 image omitted]" : result.url || "",
        downloadName: result.downloadName || ""
      };
    }

    function findHttpStatus(value) {
      if (!value || typeof value !== "object") return null;
      if (Number.isFinite(value.status)) return value.status;
      if (value.raw && typeof value.raw === "object") return findHttpStatus(value.raw);
      if (value.body && typeof value.body === "object") return findHttpStatus(value.body);
      return null;
    }

    function updateLiveMessage(message) {
      const node = document.querySelector('[data-message-id="' + message.id + '"]');
      if (!node) return false;
      upsertThinking(node, message.thinking || "");
      const body = node.querySelector(".message-body");
      if (body) body.textContent = message.content || "";
      const footer = node.querySelector(".message-footer");
      if (footer) footer.replaceWith(renderMessageFooter(message));
      syncDeveloperDetails(node, message);
      const task = node.querySelector(".task-progress");
      if (task && message.task) {
        const status = task.querySelector("[data-task-status]");
        const progress = task.querySelector("[data-task-progress]");
        const fill = task.querySelector(".progress-fill");
        if (status) status.textContent = statusLabel(message.task.status || "unknown");
        if (progress) progress.textContent = String(message.task.progress || 0) + "%";
        if (fill) fill.style.width = String(Math.min(100, Math.max(0, message.task.progress || 0))) + "%";
      }
      return true;
    }

    function syncDeveloperDetails(node, message) {
      const content = node.querySelector(".message-content");
      if (!content) return;
      const existing = content.querySelector(".message-debug");
      const wasOpen = existing ? existing.open : undefined;
      if (existing) existing.remove();
      const next = renderDeveloperDetails(message, wasOpen);
      if (next) content.appendChild(next);

    function upsertThinking(node, thinking) {
      const existing = node.querySelector(".thinking-block");
      if (!thinking) {
        if (existing) existing.remove();
        return;
      }
      if (existing) {
        const copy = existing.querySelector(".thinking-copy");
        if (copy) {
          copy.textContent = thinking;
          scrollThinkingToLatest(copy);
        }
        return;
      }
      const body = node.querySelector(".message-body");
      const bubble = node.querySelector(".bubble");
      if (!body || !bubble) return;
      const thinkingBlock = renderThinking(thinking);
      bubble.insertBefore(thinkingBlock, body);
      scrollThinkingToLatest(thinkingBlock.querySelector(".thinking-copy"));
    }

    function currentVideoMeta() {
      return VIDEO_SIZE_META[els.videoSize.value] || VIDEO_SIZE_META["1280x720"];
    }

    function videoDurationFrames(value) {
      if (!value || value === "custom") return null;
      return parseInt(String(value).split(":")[0], 10) || null;
    }

    function buildVideoDurationPresets(meta) {
      return VIDEO_TARGET_SECONDS
        .map((seconds) => videoDurationPreset(seconds, meta))
        .filter(Boolean);
    }

    function videoDurationPreset(targetSeconds, meta) {
      for (const fps of VIDEO_FPS_CANDIDATES) {
        const frames = validFramesForSeconds(targetSeconds, fps, meta.maxFrames);
        if (!frames) continue;
        const actualSeconds = frames / fps;
        return {
          value: frames + ":" + fps,
          frames,
          fps,
          seconds: actualSeconds,
          label: formatVideoDurationLabel(targetSeconds, actualSeconds, frames, fps)
        };
      }
      return null;
    }

    function validFramesForSeconds(seconds, fps, maxFrames) {
      const rawFrames = seconds * fps;
      const rounded = Math.round((rawFrames - 1) / 8) * 8 + 1;
      const floored = Math.floor((rawFrames - 1) / 8) * 8 + 1;
      const candidates = [rounded, floored]
        .filter((value) => value >= 9 && value <= maxFrames)
        .sort((a, b) => Math.abs(a / fps - seconds) - Math.abs(b / fps - seconds));
      return candidates[0] || null;
    }

    function formatVideoDurationLabel(targetSeconds, actualSeconds, frames, fps) {
      const secondsLabel = Math.abs(actualSeconds - targetSeconds) < 0.35
        ? String(targetSeconds) + " 秒"
        : "约 " + formatSeconds(actualSeconds) + " 秒";
      const strategy = videoDurationStrategy(targetSeconds, fps);
      return secondsLabel + " · " + frames + " 帧 / " + fps + " FPS · " + strategy;
    }

    function videoDurationStrategy(targetSeconds, fps) {
      if (targetSeconds <= 5 || (targetSeconds <= 10 && fps >= 24)) return "流畅优先";
      if (targetSeconds >= 25 || fps <= 8) return "时长优先";
      return "均衡";
    }

    function formatSeconds(value) {
      return Number.isInteger(value) ? String(value) : String(Math.round(value * 10) / 10);
    }

    function updateVideoDurationAvailability() {
      if (!els.videoDuration || !els.videoFrames) return;
      const meta = currentVideoMeta();
      const previousValue = els.videoDuration.value;
      const presets = buildVideoDurationPresets(meta);
      els.videoDuration.innerHTML = "";
      presets.forEach((preset) => {
        const option = document.createElement("option");
        option.value = preset.value;
        option.textContent = preset.label;
        els.videoDuration.appendChild(option);
      });
      const custom = document.createElement("option");
      custom.value = "custom";
      custom.textContent = "自定义 · 手动设置帧数和帧率";
      els.videoDuration.appendChild(custom);
      const values = presets.map((preset) => preset.value).concat("custom");
      els.videoDuration.value = values.includes(previousValue) ? previousValue : (presets[0] ? presets[0].value : "custom");
      if (els.videoDuration.value !== "custom") applyVideoDurationPreset();
      const normalized = normalizeVideoFrames(parseInt(els.videoFrames.value, 10) || 121, meta.maxFrames);
      els.videoFrames.max = String(meta.maxFrames);
      els.videoFrames.value = String(normalized);
    }

    function applyVideoDurationPreset() {
      if (!els.videoDuration || els.videoDuration.value === "custom") return;
      const [frames, fps] = els.videoDuration.value.split(":");
      els.videoFrames.value = frames;
      els.videoFrameRate.value = fps;
    }

    function getVideoTiming() {
      updateVideoDurationAvailability();
      if (els.videoDuration.value !== "custom") applyVideoDurationPreset();
      const frames = normalizeVideoFrames(parseInt(els.videoFrames.value, 10) || 121);
      els.videoFrames.value = String(frames);
      return {
        num_frames: frames,
        frame_rate: Math.min(60, Math.max(1, parseFloat(els.videoFrameRate.value) || 24))
      };
    }

    function normalizeVideoFrames(value, maxFrames = currentVideoMeta().maxFrames) {
      const safeMax = Math.max(9, maxFrames || 409);
      const bounded = Math.min(safeMax, Math.max(9, value));
      return Math.min(safeMax, Math.max(9, Math.round((bounded - 1) / 8) * 8 + 1));
    }

    function splitList(value) {
      return value.split(/[\n,]+/).map((item) => item.trim()).filter(Boolean);
    }

    function shortUrlName(url) {
      try {
        const parsed = new URL(url);
        const last = parsed.pathname.split("/").filter(Boolean).pop();
        return last || parsed.hostname || "参考图 URL";
      } catch (error) {
        return "参考图 URL";
      }
    }

    function openImagePreview(items, index = 0) {
      state.previewItems = items.filter((item) => item && item.url);
      if (!state.previewItems.length) return;
      showImagePreviewAt(index);
      els.imagePreviewModal.hidden = false;
    }

    function showImagePreviewAt(index) {
      if (!state.previewItems.length) return;
      const nextIndex = Math.min(Math.max(index, 0), state.previewItems.length - 1);
      const item = state.previewItems[nextIndex];
      state.previewIndex = nextIndex;
      els.imagePreviewModal.dataset.url = item.url;
      els.imagePreviewModal.dataset.name = item.name || "agnes-image";
      els.imagePreviewTitle.textContent = item.name || "图片预览";
      els.imagePreviewImg.src = item.url;
      els.imagePreviewImg.alt = item.name || "图片预览";
      const canSwitch = state.previewItems.length > 1;
      els.imagePreviewCounter.hidden = !canSwitch;
      els.modalPrevButton.hidden = !canSwitch;
      els.modalNextButton.hidden = !canSwitch;
      if (canSwitch) {
        els.imagePreviewCounter.textContent = String(nextIndex + 1) + " / " + String(state.previewItems.length);
        els.modalPrevButton.disabled = nextIndex === 0;
        els.modalNextButton.disabled = nextIndex === state.previewItems.length - 1;
      }
    }

    function closeImagePreview() {
      els.imagePreviewModal.hidden = true;
      els.imagePreviewImg.removeAttribute("src");
      delete els.imagePreviewModal.dataset.url;
      delete els.imagePreviewModal.dataset.name;
      els.imagePreviewCounter.hidden = true;
      els.imagePreviewCounter.textContent = "";
      els.modalPrevButton.hidden = true;
      els.modalNextButton.hidden = true;
      els.modalPrevButton.disabled = false;
      els.modalNextButton.disabled = false;
      state.previewItems = [];
      state.previewIndex = 0;
    }

    function openInNewTab(url) {
      if (!url) return;
      window.open(url, "_blank", "noopener,noreferrer");
    }

    async function downloadMedia(url, filename) {
      if (!url) return;
      try {
        const blob = await urlToBlob(url);
        const objectUrl = URL.createObjectURL(blob);
        triggerDownload(objectUrl, safeFileName(filename, blob.type));
        setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
      } catch (error) {
        if (url.startsWith("data:")) {
          triggerDownload(url, safeFileName(filename, ""));
          return;
        }
        toast("浏览器无法直接下载这个远程文件，请尝试新标签页打开后保存。");
      }
    }

    async function saveImageAs(url, filename) {
      if (!url) return;
      if (!window.showSaveFilePicker) {
        toast("当前浏览器不支持另存为对话框，请使用下载或右键另存为。");
        return;
      }
      try {
        const blob = await urlToBlob(url);
        const handle = await window.showSaveFilePicker({
          suggestedName: safeFileName(filename, blob.type),
          types: [
            {
              description: "图片文件",
              accept: {
                "image/png": [".png"],
                "image/jpeg": [".jpg", ".jpeg"],
                "image/webp": [".webp"],
                "image/gif": [".gif"]
              }
            }
          ]
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        toast("图片已保存");
      } catch (error) {
        if (error && error.name === "AbortError") return;
        toast("无法打开另存为对话框。远程图片可能限制了浏览器读取，请尝试新标签页打开后保存。");
      }
    }

    async function urlToBlob(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error("HTTP " + response.status);
      return response.blob();
    }

    function triggerDownload(url, filename) {
      const link = document.createElement("a");
      link.href = url;
      link.download = filename || "agnes-image.png";
      link.style.display = "none";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function safeFileName(name, mimeType) {
      const fallbackExt = mimeType && mimeType.includes("jpeg") ? ".jpg" : mimeType && mimeType.includes("webp") ? ".webp" : ".png";
      const clean = String(name || "agnes-image").replace(/[\\/:*?"<>|]+/g, "-").trim() || "agnes-image";
      return /\.[a-z0-9]{2,5}$/i.test(clean) ? clean : clean + fallbackExt;
    }

    function safeUploadName(name, mimeType) {
      return safeFileName(name || "agnes-reference", mimeType);
    }

    function numberOrDefault(value, fallback) {
      const num = Number(value);
      return Number.isFinite(num) ? num : fallback;
    }

    function formatBytes(bytes) {
      if (!bytes) return "本地图片";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function stringify(value) {
      if (typeof value === "string") return value;
      try {
        return JSON.stringify(value, null, 2);
      } catch (error) {
        return String(value);
      }
    }

    function formatError(error) {
      const message = error && error.message ? error.message : String(error);
      if (message.includes("图床")) {
        return message;
      }
      if ((error && error.status === 401) || message.includes("无效的令牌")) {
        return "连接 Agnes 失败：这个 API Key 看起来无效或已过期，请重新粘贴后再试。";
      }
      if (message.includes("网络请求失败") || message.includes("跨域")) {
        if (state.mode === "video") {
          return "视频请求暂时没有连上 Agnes。请检查网络连接，稍后再试。";
        }
        return "这次没有连上 Agnes。请检查网络连接，稍后再试。";
      }
      if (error && error.status) {
        const reason = extractErrorReason(error);
        const prefix = state.mode === "video" ? "视频请求没有成功" : "这次创作没有成功";
        const friendly = friendlyErrorReason(reason);
        return friendly ? prefix + "。原因：" + friendly : prefix + "。可以调整内容后再试。";
      }
      return message;
    }

    function formatVideoFailure(data) {
      const reason = extractErrorReason(data);
      const lines = ["视频创作失败了。"];
      const friendly = videoFailureReason(reason);
      if (friendly) {
        lines.push("原因：" + friendly);
      } else if (reason) {
        lines.push("原因：Agnes 返回了错误，详细内容可以在调试模式中查看。");
      } else {
        lines.push("Agnes 没有返回具体失败原因。可以开启调试模式查看原始响应，方便排查。");
      }
      const hint = videoFailureHint(reason);
      if (hint) lines.push("建议：" + hint);
      return lines.join("\n");
    }

    function videoFailureHint(reason) {
      const text = String(reason || "").toLowerCase();
      if (!text) return "";
      const limit = parseVideoLimitError(reason);
      if (limit) {
        return "当前设置为 " + limit.frames + " 帧，超过 " + limit.resolution.toUpperCase() + " " + limit.ratio + " 的上限 " + limit.maxFrames + " 帧。请改用更短时长，或切换到 720P 后重试。";
      }
      if (text.includes("cannot identify image") || text.includes("image file") || text.includes("invalid image") || text.includes("unsupported image")) {
        return "参考图可能不是 Agnes 能识别的图片文件。请换一张 PNG/JPG/WebP 图片，或使用可直接访问的公开 HTTPS 图片 URL 后重试。";
      }
      if (text.includes("url") || text.includes("access") || text.includes("download") || text.includes("forbidden") || text.includes("not found")) {
        return "参考图 URL 可能无法被 Agnes 服务端访问。请确认图片不需要登录、Cookie 或私有 Header。";
      }
      if (text.includes("num_frames") || text.includes("frame")) {
        return "视频帧数需要不超过 441，并满足 8n + 1。可以先选择 5 秒或 10 秒重试。";
      }
      if (text.includes("width") || text.includes("height") || text.includes("resolution") || text.includes("size")) {
        return "当前分辨率可能不适合这次生成。可以先切换到 720P 横版或竖版重试。";
      }
      if (text.includes("content") || text.includes("policy") || text.includes("safety")) {
        return "提示词或参考图可能触发内容限制。请换一个更明确、温和的描述后重试。";
      }
      if (text.includes("timeout") || text.includes("busy") || text.includes("overload")) {
        return "服务可能繁忙或生成超时。可以稍后重试，或降低分辨率、缩短时长。";
      }
      return "";
    }

    function videoFailureReason(reason) {
      const text = String(reason || "").toLowerCase();
      if (!text) return "";
      const limit = parseVideoLimitError(reason);
      if (limit) {
        return "当前视频长度超过了 " + limit.resolution.toUpperCase() + " " + limit.ratio + " 的接口上限。";
      }
      if (text.includes("cannot identify image") || text.includes("image file") || text.includes("invalid image") || text.includes("unsupported image")) {
        return "参考图没有被 Agnes 正确识别。";
      }
      if (text.includes("url") || text.includes("access") || text.includes("download") || text.includes("forbidden") || text.includes("not found")) {
        return "参考图地址可能无法被 Agnes 服务端访问。";
      }
      if (text.includes("num_frames") || text.includes("frame")) {
        return "视频长度或帧数设置不符合接口要求。";
      }
      if (text.includes("width") || text.includes("height") || text.includes("resolution") || text.includes("size")) {
        return "当前分辨率设置不适合这次生成。";
      }
      if (text.includes("content") || text.includes("policy") || text.includes("safety")) {
        return "提示词或参考图可能触发了内容限制。";
      }
      if (text.includes("timeout") || text.includes("busy") || text.includes("overload")) {
        return "服务可能繁忙或生成超时。";
      }
      return "";
    }

    function parseVideoLimitError(reason) {
      const text = String(reason || "");
      const match = text.match(/num_frames\s+(\d+)\s+exceeds maximum\s+(\d+)\s+for\s+([0-9]+p)\/([0-9:]+)/i);
      if (!match) return null;
      return {
        frames: parseInt(match[1], 10),
        maxFrames: parseInt(match[2], 10),
        resolution: match[3],
        ratio: match[4]
      };
    }

    function friendlyErrorReason(reason) {
      const text = String(reason || "").toLowerCase();
      if (!text) return "";
      if (state.mode === "video") return videoFailureReason(reason);
      if (text.includes("quota") || text.includes("limit") || text.includes("rate")) return "当前请求额度或频率可能受限。";
      if (text.includes("prompt") || text.includes("content") || text.includes("policy") || text.includes("safety")) return "输入内容可能不符合本次生成要求。";
      if (text.includes("image") || text.includes("url") || text.includes("download") || text.includes("access")) return "参考图片或链接可能无法被服务端读取。";
      if (text.includes("model")) return "当前模型暂时无法处理这次请求。";
      return "";
    }

    function extractErrorReason(value) {
      const seen = new Set();
      const reason = findErrorReason(value, seen, 0);
      return cleanErrorReason(reason);
    }

    function findErrorReason(value, seen, depth) {
      if (value == null || depth > 6) return "";
      if (typeof value === "string") return value;
      if (typeof value !== "object") return "";
      if (seen.has(value)) return "";
      seen.add(value);
      if (value.raw) {
        const rawReason = findErrorReason(value.raw, seen, depth + 1);
        if (rawReason) return rawReason;
      }
      if (value.error) {
        const errorReason = findErrorReason(value.error, seen, depth + 1);
        if (errorReason) return errorReason;
      }
      if (value.body) {
        const bodyReason = findErrorReason(value.body, seen, depth + 1);
        if (bodyReason) return bodyReason;
      }
      const keys = ["message", "detail", "reason", "error_message", "errorMessage", "error_description", "description", "msg"];
      for (const key of keys) {
        if (typeof value[key] === "string" && value[key].trim()) return value[key];
      }
      for (const key of Object.keys(value)) {
        if (key === "raw" || key === "error" || key === "body") continue;
        const nested = findErrorReason(value[key], seen, depth + 1);
        if (nested) return nested;
      }
      return "";
    }

    function cleanErrorReason(reason) {
      const text = String(reason || "").trim();
      if (!text) return "";
      if (text.length <= 500) return text;
      return text.slice(0, 500) + "...";
    }

    function debugErrorDetails(error) {
      if (error && error.raw) return error.raw;
      return {
        type: "client_error",
        mode: state.mode,
        message: error && error.message ? error.message : String(error),
        name: error && error.name ? error.name : "Error",
        status: error && error.status ? error.status : null,
        created_at: new Date().toISOString()
      };
    }

    function statusLabel(status) {
      return {
        done: "完成",
        loading: "生成中",
        canceled: "已取消",
        error: "需要处理",
        queued: "排队中",
        in_progress: "生成中",
        completed: "完成",
        failed: "失败",
        unknown: "处理中"
      }[status] || status;
    }

    function formatMessageTime(value) {
      const time = new Date(value).getTime();
      if (!Number.isFinite(time)) return "";
      const diff = Math.max(0, Date.now() - time);
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;
      if (diff < minute) return "刚刚";
      if (diff < hour) return Math.floor(diff / minute) + "分钟前";
      if (diff < day) return Math.floor(diff / hour) + "小时前";
      if (diff < 30 * day) return Math.floor(diff / day) + "天前";
      return formatMonth(time);
    }

    function formatExactTime(value) {
      const time = new Date(value).getTime();
      if (!Number.isFinite(time)) return "";
      return new Date(time).toLocaleString([], {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatUsage(usage) {
      if (!usage || typeof usage !== "object") return "";
      const total = usage.total_tokens || usage.total || usage.tokens;
      if (total) return "消耗 " + total + " tokens";
      const prompt = usage.prompt_tokens || usage.input_tokens || 0;
      const completion = usage.completion_tokens || usage.output_tokens || 0;
      const sum = prompt + completion;
      return sum ? "消耗 " + sum + " tokens" : "";
    }

    function makeTitle(content) {
      return content.replace(/\s+/g, " ").trim().slice(0, 26) || "新的对话";
    }

    function makeId() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function startOfDay(time) {
      const date = new Date(time);
      date.setHours(0, 0, 0, 0);
      return date.getTime();
    }

    function formatMonth(time) {
      const date = new Date(time);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        els.messages.scrollTop = els.messages.scrollHeight;
      });
    }

    function wait(ms, signal) {
      return new Promise((resolve, reject) => {
        if (signal && signal.aborted) {
          reject(abortError());
          return;
        }
        const timer = setTimeout(() => {
          if (signal) signal.removeEventListener("abort", onAbort);
          resolve();
        }, ms);
        function onAbort() {
          clearTimeout(timer);
          reject(abortError());
        }
        if (signal) signal.addEventListener("abort", onAbort, { once: true });
      });
    }

    function abortError() {
      try {
        return new DOMException("AbortError", "AbortError");
      } catch (error) {
        const err = new Error("AbortError");
        err.name = "AbortError";
        return err;
      }
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(text);
          return;
        } catch (error) {
          // Fall back for browsers that expose Clipboard API but deny this page.
        }
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    let toastTimer = null;
    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove("show"), 2600);
    }
  </script>
</body>
</html>
